<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SAP - Treinamentos PE/EM</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="root"></div>

    <!-- Libraries (CDN) -->
    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.production.min.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!--
      Application modules.
      Load order matters: each file may use names defined in files above it.
      All files are <script type="text/babel"> so Babel transpiles JSX before
      executing them. Top-level `const`s declared in one file are visible to
      subsequent files because Babel emits classic scripts (not modules).
    -->

    <!-- 0. React hooks destructuring (must come first) -->
    <script type="text/babel" data-presets="react" src="js/00-header.js"></script>

    <!-- 1. Pure data and helpers (no component deps) -->
    <script type="text/babel" data-presets="react" src="js/data.js"></script>
    <script type="text/babel" data-presets="react" src="js/progress.js"></script>
    <script type="text/babel" data-presets="react" src="js/trainings.js"></script>

    <!-- 2. Icon component (used by everything else) -->
    <script type="text/babel" data-presets="react" src="js/icons.js"></script>

    <!-- 3. Reusable UI components -->
    <script type="text/babel" data-presets="react" src="js/components-common.js"></script>
    <script type="text/babel" data-presets="react" src="js/components-progress-bar.js"></script>
    <script type="text/babel" data-presets="react" src="js/components-tour.js"></script>
    <script type="text/babel" data-presets="react" src="js/home-bar.js"></script>

    <!-- 4. Modals and dropdowns -->
    <script type="text/babel" data-presets="react" src="js/modal-status.js"></script>
    <script type="text/babel" data-presets="react" src="js/modal-selecionar-objeto.js"></script>
    <script type="text/babel" data-presets="react" src="js/dropdown-servicos.js"></script>

    <!-- 5. Screens (in usage order) -->
    <script type="text/babel" data-presets="react" src="js/screen-home.js"></script>
    <script type="text/babel" data-presets="react" src="js/screen-nota-input.js"></script>
    <script type="text/babel" data-presets="react" src="js/screen-tab-contents.js"></script>
    <script type="text/babel" data-presets="react" src="js/screen-atividades.js"></script>
    <script type="text/babel" data-presets="react" src="js/screen-acoes.js"></script>
    <script type="text/babel" data-presets="react" src="js/screen-nota-detail.js"></script>
    <script type="text/babel" data-presets="react" src="js/screen-solicitacao.js"></script>
    <script type="text/babel" data-presets="react" src="js/screen-text-editor.js"></script>
    <script type="text/babel" data-presets="react" src="js/screen-training-index.js"></script>
    <script type="text/babel" data-presets="react" src="js/screen-submodule-index.js"></script>
    <script type="text/babel" data-presets="react" src="js/screen-deck.js"></script>

    <!-- 6. Tour step definitions (depends on nothing, but kept near app) -->
    <script type="text/babel" data-presets="react" src="js/tour-steps.js"></script>

    <!-- 7. Main App + ReactDOM mount (must be last) -->
    <script type="text/babel" data-presets="react" src="js/app.js"></script>
  </body>
</html>
