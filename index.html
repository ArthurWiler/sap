<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SAP - Página inicial</title>
    <style>
      :root {
        --bg: #f5f6f7;
        --surface: #ffffff;
        --border: #d9d9d9;
        --border-strong: #b4b4b4;
        --text: #32363a;
        --text-secondary: #6a6d70;
        --text-disabled: #89919a;
        /* CEMIG green palette */
        --link: #00833e;
        --link-hover: #006830;
        --link-light: #76bc21;
        --highlight-bg: #d6f0dd;
        --tab-active: #00833e;
        /* SAP brand logo stays SAP blue, not CEMIG */
        --sap-blue-logo: #1b90ff;
        --sap-blue-dark: #003a6a;
        /* CEMIG accent for app chrome */
        --cemig-green: #00833e;
        --cemig-green-dark: #004d24;
        --cemig-green-light: #76bc21;
        --button-bg: #ffffff;
        --button-border: #b3b3b3;
        --section-bg: #fafafa;
        --header-shadow: 0 1px 0 rgba(0, 0, 0, 0.08);
        --tile-shadow:
          0 0 0 1px rgba(0, 0, 0, 0.05), 0 1px 2px rgba(0, 0, 0, 0.04);
        --tile-shadow-hover:
          0 0 0 1px rgba(0, 131, 62, 0.3), 0 4px 12px rgba(0, 131, 62, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        font-family:
          "72",
          "72full",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Arial,
          sans-serif;
        font-size: 14px;
        color: var(--text);
        background: var(--bg);
        min-height: 100vh;
      }

      #root {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ===== HEADER (HOME) ===== */
      .home-header {
        display: flex;
        align-items: center;
        height: 48px;
        background: var(--surface);
        box-shadow: var(--header-shadow);
        padding: 0 16px;
        gap: 16px;
        flex-shrink: 0;
      }
      .home-header .sap-logo {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: var(--sap-blue-logo);
        color: white;
        font-weight: 700;
        font-size: 13px;
        width: 44px;
        height: 22px;
        letter-spacing: 0.5px;
        transform: skewX(-12deg);
        border-radius: 1px;
      }
      .home-header .sap-logo span {
        transform: skewX(12deg);
      }
      .home-header .page-title {
        font-size: 16px;
        font-weight: 400;
        color: var(--text);
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
      }
      .home-header .spacer {
        flex: 1;
      }
      .home-header .icon-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        cursor: pointer;
        color: #515559;
      }
      .home-header .icon-btn:hover {
        background: #eaecee;
      }
      .home-header .avatar {
        width: 32px;
        height: 32px;
        background: #d6f0dd;
        color: #006830;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }

      /* ===== HOME SUB-BAR ===== */
      .home-subbar {
        display: flex;
        align-items: stretch;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 0 16px;
        height: 36px;
        flex-shrink: 0;
      }
      .home-subbar .hamburger {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        margin-top: 2px;
        margin-right: 12px;
        cursor: pointer;
        color: #515559;
        border-radius: 4px;
      }
      .home-subbar .hamburger:hover {
        background: #eaecee;
      }
      .home-subbar .home-tab {
        display: inline-flex;
        align-items: center;
        padding: 0 12px;
        font-size: 14px;
        color: var(--link);
        border-bottom: 3px solid var(--link);
        cursor: pointer;
        height: 100%;
        margin-bottom: -1px;
      }
      .home-subbar .home-tab-sep {
        display: inline-block;
        width: 1px;
        height: 18px;
        background: #d0d0d0;
        align-self: center;
        margin-left: 8px;
      }

      /* ===== HOME BODY ===== */
      .home-body {
        padding: 24px 32px;
        flex: 1;
      }
      .home-section-title {
        font-size: 18px;
        font-weight: 700;
        color: var(--text);
        margin: 0 0 16px 0;
      }
      .tile-row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }
      .tile {
        width: 176px;
        height: 176px;
        background: var(--surface);
        border-radius: 6px;
        padding: 14px;
        cursor: pointer;
        box-shadow: var(--tile-shadow);
        transition:
          box-shadow 120ms ease,
          transform 120ms ease;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .tile:hover {
        box-shadow: var(--tile-shadow-hover);
        transform: translateY(-1px);
      }
      .tile .tile-title {
        font-size: 14px;
        font-weight: 700;
        color: var(--text);
        line-height: 1.3;
      }
      .tile .tile-sub {
        font-size: 13px;
        color: var(--text-secondary);
        margin-top: 4px;
      }
      .tile .tile-foot {
        font-size: 12px;
        color: var(--text-secondary);
      }

      /* ===== TRAINING INDEX ===== */
      .training-page {
        flex: 1;
        background: linear-gradient(180deg, #f3f8f5 0%, #e6efe8 100%);
        overflow: auto;
      }
      .training-hero {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 28px 40px;
        display: flex;
        align-items: center;
        gap: 20px;
      }
      .training-hero .hero-mark {
        width: 56px;
        height: 56px;
        background: linear-gradient(
          135deg,
          var(--cemig-green-light),
          var(--cemig-green)
        );
        color: white;
        border-radius: 12px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        font-weight: 700;
        box-shadow: 0 4px 12px rgba(0, 131, 62, 0.25);
      }
      .training-hero h1 {
        margin: 0 0 4px 0;
        font-size: 22px;
        color: var(--text);
        font-weight: 700;
      }
      .training-hero p {
        margin: 0;
        font-size: 14px;
        color: var(--text-secondary);
      }
      .training-body {
        padding: 32px 40px;
        max-width: 1100px;
        margin: 0 auto;
      }
      .training-section-title {
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        color: var(--text-secondary);
        margin: 0 0 12px 4px;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .training-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 16px;
      }
      .training-card {
        background: var(--surface);
        border-radius: 10px;
        padding: 18px 18px 16px;
        box-shadow:
          0 1px 2px rgba(0, 0, 0, 0.04),
          0 0 0 1px rgba(0, 0, 0, 0.04);
        transition:
          box-shadow 150ms ease,
          transform 150ms ease;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        position: relative;
        min-height: 160px;
      }
      .training-card.available:hover {
        box-shadow:
          0 4px 16px rgba(0, 131, 62, 0.12),
          0 0 0 1px rgba(0, 131, 62, 0.25);
        transform: translateY(-2px);
      }
      .training-card.locked {
        opacity: 0.62;
        cursor: not-allowed;
      }
      .training-card .card-icon {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        background: #e8f5ee;
        color: var(--link);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 10px;
      }
      .training-card.locked .card-icon {
        background: #ececec;
        color: #8a8d90;
      }
      .training-card h3 {
        margin: 0 0 6px 0;
        font-size: 15px;
        font-weight: 700;
        color: var(--text);
        line-height: 1.3;
      }
      .training-card p {
        margin: 0;
        font-size: 13px;
        color: var(--text-secondary);
        line-height: 1.45;
        flex: 1;
      }
      .training-tags {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-top: 12px;
      }
      .training-tag {
        font-size: 11px;
        background: #f0f3f7;
        color: var(--text-secondary);
        padding: 2px 8px;
        border-radius: 10px;
      }
      .training-card .start-link {
        margin-top: 12px;
        color: var(--link);
        font-size: 13px;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }
      .training-card.locked .start-link {
        color: #999;
      }
      .locked-badge {
        position: absolute;
        top: 12px;
        right: 12px;
        background: #f0f3f7;
        color: #6a6d70;
        font-size: 10px;
        padding: 3px 8px;
        border-radius: 10px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        font-weight: 600;
      }

      /* ===== TRAINING TOP BAR ===== */
      .training-topbar {
        height: 44px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        padding: 0 20px;
        gap: 12px;
        flex-shrink: 0;
        border-top: 3px solid var(--cemig-green);
      }
      .training-topbar .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--text);
        font-weight: 700;
        font-size: 14px;
      }
      .training-topbar .cemig-mark {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        border-radius: 6px;
        background: linear-gradient(
          135deg,
          var(--cemig-green-light),
          var(--cemig-green)
        );
        color: white;
        font-weight: 800;
        font-size: 14px;
        box-shadow: 0 1px 3px rgba(0, 131, 62, 0.3);
      }
      .training-topbar .spacer {
        flex: 1;
      }
      .training-topbar .breadcrumb-link {
        color: var(--link);
        cursor: pointer;
        font-size: 13px;
      }
      .training-topbar .breadcrumb-link:hover {
        text-decoration: underline;
      }

      /* Difficulty groups */
      .training-group {
        margin-bottom: 28px;
      }
      .diff-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #ccc;
      }
      .diff-dot.diff-iniciante {
        background: #76bc21;
      }
      .diff-dot.diff-intermediario {
        background: #f0a020;
      }
      .diff-dot.diff-avancado {
        background: #c8412c;
      }

      /* Platform badge */
      .platform-badge {
        position: absolute;
        top: 12px;
        right: 12px;
        background: var(--cemig-green);
        color: white;
        font-size: 10px;
        padding: 3px 8px;
        border-radius: 10px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }
      /* When both locked-badge and platform-badge present, stack them */
      .training-card .platform-badge ~ .locked-badge,
      .training-card .locked-badge + .platform-badge {
        /* if both, locked goes above the platform badge */
      }
      .training-card.locked .platform-badge {
        top: 38px; /* push below the EM BREVE badge */
        background: #aeb8b0;
      }

      /* Submodules tag */
      .submods-tag {
        background: #e6f3ec !important;
        color: var(--cemig-green-dark) !important;
        display: inline-flex !important;
        align-items: center;
        gap: 3px;
        font-weight: 600;
      }

      /* ===== PROGRESS BAR ===== */
      .progress-wrap {
        margin-top: 10px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .progress-bar {
        flex: 1;
        height: 6px;
        background: #e9ecef;
        border-radius: 3px;
        overflow: hidden;
        position: relative;
      }
      .progress-bar .fill {
        height: 100%;
        background: linear-gradient(
          90deg,
          var(--cemig-green-light),
          var(--cemig-green)
        );
        border-radius: 3px;
        transition: width 300ms ease;
      }
      .progress-label {
        font-size: 11px;
        color: var(--text-secondary);
        font-weight: 600;
        min-width: 36px;
        text-align: right;
      }
      /* Big progress (hero) */
      .hero-progress {
        margin-top: 12px;
        display: flex;
        align-items: center;
        gap: 12px;
        max-width: 460px;
      }
      .hero-progress .progress-bar {
        height: 8px;
      }
      .hero-progress .progress-label {
        font-size: 13px;
        color: var(--text);
      }

      /* ===== SUBMODULE PAGE ===== */
      .sub-hero {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 24px 40px;
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .sub-hero .back-circle {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: #f0f3f5;
        color: #515559;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        flex-shrink: 0;
        transition: background 150ms ease;
      }
      .sub-hero .back-circle:hover {
        background: var(--cemig-green);
        color: white;
      }
      .sub-hero h1 {
        margin: 0 0 4px 0;
        font-size: 20px;
        color: var(--text);
        font-weight: 700;
      }
      .sub-hero .crumb {
        color: var(--text-secondary);
        font-size: 13px;
        margin-bottom: 2px;
      }
      .sub-hero .difficulty-pill {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 2px 10px;
        background: #f0f3f5;
        border-radius: 10px;
        font-size: 11px;
        font-weight: 600;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-left: 8px;
        vertical-align: middle;
      }

      .sub-body {
        padding: 24px 40px;
        max-width: 900px;
        margin: 0 auto;
      }
      .sub-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .sub-item {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 16px 20px;
        display: flex;
        align-items: center;
        gap: 16px;
        cursor: pointer;
        transition:
          box-shadow 150ms ease,
          border-color 150ms ease,
          transform 150ms ease;
      }
      .sub-item:hover {
        border-color: var(--cemig-green);
        box-shadow: 0 2px 10px rgba(0, 131, 62, 0.08);
        transform: translateY(-1px);
      }
      .sub-item.locked {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .sub-item.locked:hover {
        border-color: var(--border);
        box-shadow: none;
        transform: none;
      }
      .sub-item .sub-num {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: #f0f3f5;
        color: var(--text-secondary);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 13px;
        flex-shrink: 0;
      }
      .sub-item.done .sub-num {
        background: var(--cemig-green);
        color: white;
      }
      .sub-item .sub-content {
        flex: 1;
        min-width: 0;
      }
      .sub-item h3 {
        margin: 0 0 2px 0;
        font-size: 15px;
        color: var(--text);
        font-weight: 600;
      }
      .sub-item p {
        margin: 0;
        color: var(--text-secondary);
        font-size: 13px;
      }
      .sub-item .sub-action {
        color: var(--link);
        font-size: 13px;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }
      .sub-item.locked .sub-action {
        color: var(--text-disabled);
      }

      /* "Voltar" button used in headers */
      .back-btn-pill {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        height: 28px;
        padding: 0 12px;
        background: white;
        border: 1px solid var(--button-border);
        border-radius: 14px;
        color: var(--text-secondary);
        cursor: pointer;
        font-size: 13px;
        transition: all 150ms ease;
      }
      .back-btn-pill:hover {
        border-color: var(--cemig-green);
        color: var(--cemig-green);
      }

      /* ===== MEDIDAS TABLE ===== */
      .med-table-wrap {
        border: 1px solid var(--border);
        border-radius: 2px;
        background: white;
        overflow: auto;
        max-width: 100%;
        margin-top: 8px;
      }
      .med-table {
        border-collapse: collapse;
        width: 100%;
        font-size: 12px;
      }
      .med-table th {
        background: #f7f7f7;
        color: var(--text);
        text-align: left;
        font-weight: 400;
        padding: 5px 8px;
        border-bottom: 1px solid var(--border);
        border-right: 1px solid #ececec;
        white-space: nowrap;
        position: sticky;
        top: 0;
        z-index: 1;
      }
      .med-table td {
        padding: 4px 8px;
        border-bottom: 1px solid #ececec;
        border-right: 1px solid #ececec;
        color: var(--text);
        white-space: nowrap;
        vertical-align: middle;
      }
      .med-table tr.selected td {
        background: #d6f0dd;
      }
      .med-table tr:hover:not(.selected) td {
        background: #f6faf8;
      }
      .med-table .row-cb {
        width: 22px;
        text-align: center;
      }
      .med-table .row-cb input {
        margin: 0;
      }
      .med-table .pencil-cell {
        width: 26px;
        text-align: center;
        cursor: pointer;
        color: var(--cemig-green);
      }
      .med-table .pencil-cell:hover {
        background: #e8f5ee;
      }
      .med-table .truncate {
        max-width: 200px;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .med-table .empty-row td {
        color: transparent;
        height: 22px;
      }
      .med-table .empty-row .row-cb input[type="checkbox"] {
        opacity: 0.5;
      }
      .med-table .empty-row .empty-num {
        color: var(--text-secondary);
      }

      .med-toolbar {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 6px 4px;
        border-top: 1px solid #ececec;
        background: #fafafa;
        flex-wrap: wrap;
      }
      .med-toolbar .tool-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 26px;
        height: 26px;
        border-radius: 4px;
        cursor: pointer;
        color: var(--link);
      }
      .med-toolbar .tool-icon:hover {
        background: #e8f5ee;
      }
      .med-toolbar .tool-icon.disabled {
        color: var(--text-disabled);
        cursor: not-allowed;
      }
      .med-toolbar .tool-icon.disabled:hover {
        background: transparent;
      }
      .med-toolbar .pager-info {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: var(--text);
      }

      /* Ações tab subheader */
      .acoes-subheader {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        padding: 6px 4px;
        font-size: 12px;
        color: var(--text);
      }
      .acoes-subheader .label {
        color: var(--text-secondary);
      }
      .acoes-table-wrap {
        /* same as med-table-wrap */
        border: 1px solid var(--border);
        border-radius: 2px;
        background: white;
        overflow: auto;
        margin-top: 4px;
        max-height: 480px;
      }
      .acoes-table {
        border-collapse: collapse;
        width: 100%;
        font-size: 12px;
      }
      .acoes-table th {
        background: #f7f7f7;
        text-align: left;
        font-weight: 400;
        padding: 5px 8px;
        border-bottom: 1px solid var(--border);
        border-right: 1px solid #ececec;
        color: var(--text);
        white-space: nowrap;
      }
      .acoes-table td {
        padding: 3px 8px;
        border-bottom: 1px solid #ececec;
        border-right: 1px solid #ececec;
        height: 22px;
        color: var(--text);
        white-space: nowrap;
      }
      .acoes-table .row-radio {
        width: 22px;
        text-align: center;
      }
      .acoes-table .inicio-cell {
        background: #ebf5fe;
      }

      /* ===== MODAL OVERLAY ===== */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(35, 40, 47, 0.45);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 100;
        animation: fadeIn 120ms ease;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      .modal {
        background: white;
        border-radius: 8px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
        min-width: 460px;
        max-width: 720px;
        max-height: 80vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .modal-header {
        padding: 14px 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--border);
      }
      .modal-header h3 {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
        color: var(--text);
      }
      .modal-close {
        color: var(--text-secondary);
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 24px;
        height: 24px;
        border-radius: 4px;
      }
      .modal-close:hover {
        background: #f0f3f5;
        color: var(--text);
      }
      .modal-body {
        padding: 16px 18px;
        overflow: auto;
        flex: 1;
      }
      .modal-footer {
        padding: 10px 18px;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 8px;
        border-top: 1px solid var(--border);
      }
      .modal-footer .icon-action {
        width: 28px;
        height: 28px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        border-radius: 4px;
      }
      .modal-footer .icon-action.confirm {
        color: #2eb872;
      }
      .modal-footer .icon-action.confirm:hover {
        background: #e6f7ee;
      }
      .modal-footer .icon-action.cancel {
        color: #c8412c;
      }
      .modal-footer .icon-action.cancel:hover {
        background: #fbeae7;
      }

      .modal .info-note {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        background: #f0f3f5;
        border-radius: 4px;
        padding: 10px 12px;
        margin-bottom: 12px;
        font-size: 13px;
        color: var(--text);
      }
      .modal .info-note .info-mark {
        background: var(--cemig-green);
        color: white;
        border-radius: 3px;
        width: 18px;
        height: 18px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        flex-shrink: 0;
        font-size: 12px;
      }

      .modal-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      .modal-table th {
        text-align: left;
        background: #f7f7f7;
        padding: 6px 10px;
        border-bottom: 1px solid var(--border);
        font-weight: 400;
        color: var(--text);
        white-space: nowrap;
      }
      .modal-table td {
        padding: 5px 10px;
        border-bottom: 1px solid #ececec;
        color: var(--text);
        white-space: nowrap;
      }
      .modal-table tr {
        cursor: pointer;
      }
      .modal-table tr:hover td {
        background: #f6faf8;
      }
      .modal-table tr.selected td {
        background: #d6f0dd;
      }
      .modal-table .row-radio {
        width: 22px;
        text-align: center;
      }
      .modal-table .row-radio input {
        margin: 0;
      }

      .modal-section-title {
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
        margin: 14px 0 6px 0;
      }
      .modal-section-title:first-child {
        margin-top: 0;
      }

      /* ===== SERVIÇOS PARA OBJETO DROPDOWN ===== */
      .menu-overlay {
        position: fixed;
        inset: 0;
        z-index: 90;
      }
      .dropdown-panel {
        position: absolute;
        background: white;
        border: 1px solid var(--border);
        border-radius: 4px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        min-width: 220px;
        padding: 4px 0;
        z-index: 95;
      }
      .dropdown-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 7px 14px;
        font-size: 13px;
        color: var(--text);
        cursor: pointer;
        white-space: nowrap;
        gap: 16px;
        position: relative;
      }
      .dropdown-item:hover:not(.disabled) {
        background: var(--cemig-green);
        color: white;
      }
      .dropdown-item.disabled {
        color: var(--text-disabled);
        cursor: default;
      }
      .dropdown-separator {
        height: 1px;
        background: #ececec;
        margin: 4px 0;
      }
      .dropdown-section-label {
        font-size: 11px;
        color: var(--text-disabled);
        padding: 4px 14px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      /* ===== TEXT EDITOR PAGE ===== */
      .text-editor-page {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .text-editor-toolbar {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 6px 16px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
      }
      .text-editor-toolbar .tool-btn {
        border: 1px solid var(--button-border);
        background: white;
        height: 26px;
        padding: 0 10px;
        color: var(--link);
        border-radius: 4px;
        font-size: 13px;
        cursor: pointer;
      }
      .text-editor-toolbar .tool-btn:hover {
        background: #e8f5ee;
        border-color: var(--link);
      }
      .text-editor-body {
        flex: 1;
        overflow: auto;
        padding: 16px;
        background: var(--bg);
      }
      .editor-table {
        width: 100%;
        border-collapse: collapse;
        background: white;
        font-family: "Consolas", "Monaco", "Courier New", monospace;
        font-size: 12px;
      }
      .editor-table th,
      .editor-table td {
        border: 1px solid #d9d9d9;
        padding: 3px 8px;
        vertical-align: top;
      }
      .editor-table th {
        background: #f7f7f7;
        font-weight: 400;
        color: var(--text);
      }
      .editor-table .col-f {
        width: 38px;
      }
      .editor-table .col-l {
        width: 28px;
        text-align: center;
      }
      .editor-table .col-r {
        width: 38px;
      }
      .editor-table .ruler-cell {
        background: white;
        color: #515559;
      }
      .editor-table .text-line {
        background: #ebf5fe;
      }
      .editor-table .empty-line {
        height: 18px;
      }
      .editor-table .marker {
        color: var(--text-secondary);
        text-align: center;
      }
      .editor-status-line {
        margin-top: 16px;
        padding: 8px 16px;
        text-align: center;
        color: var(--text-secondary);
        font-size: 12px;
        font-family: "Consolas", "Monaco", "Courier New", monospace;
        border-top: 1px dashed var(--border-strong);
      }

      /* ===== GUIDED TOUR ===== */
      .tour-spotlight-overlay {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 1000;
      }
      .tour-mask {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        transition: clip-path 250ms ease;
      }
      .tour-spotlight {
        position: absolute;
        border: 2px solid var(--cemig-green-light);
        border-radius: 6px;
        box-shadow:
          0 0 0 4px rgba(118, 188, 33, 0.3),
          0 0 30px rgba(118, 188, 33, 0.5);
        pointer-events: none;
        transition: all 250ms ease;
        animation: tour-pulse 1.6s ease-in-out infinite;
      }
      @keyframes tour-pulse {
        0%,
        100% {
          box-shadow:
            0 0 0 4px rgba(118, 188, 33, 0.3),
            0 0 30px rgba(118, 188, 33, 0.5);
        }
        50% {
          box-shadow:
            0 0 0 8px rgba(118, 188, 33, 0.2),
            0 0 40px rgba(118, 188, 33, 0.7);
        }
      }
      .tour-tooltip {
        position: absolute;
        background: white;
        border-radius: 10px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
        padding: 16px 18px;
        width: 320px;
        pointer-events: auto;
        z-index: 1002;
        border-top: 3px solid var(--cemig-green);
      }
      .tour-tooltip .step-label {
        font-size: 11px;
        color: var(--cemig-green);
        font-weight: 700;
        letter-spacing: 0.6px;
        text-transform: uppercase;
        margin-bottom: 4px;
      }
      .tour-tooltip h4 {
        margin: 0 0 6px 0;
        font-size: 15px;
        font-weight: 700;
        color: var(--text);
      }
      .tour-tooltip p {
        margin: 0;
        font-size: 13px;
        color: var(--text-secondary);
        line-height: 1.45;
      }
      .tour-tooltip .tour-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 12px;
        gap: 8px;
      }
      .tour-tooltip .tour-progress {
        font-size: 11px;
        color: var(--text-secondary);
        font-weight: 600;
      }
      .tour-tooltip .tour-buttons {
        display: flex;
        gap: 6px;
      }
      .tour-tooltip .tour-btn {
        border: 1px solid var(--button-border);
        background: white;
        color: var(--text);
        padding: 5px 12px;
        border-radius: 4px;
        font-size: 12px;
        cursor: pointer;
        font: inherit;
      }
      .tour-tooltip .tour-btn:hover {
        background: #f0f3f5;
      }
      .tour-tooltip .tour-btn.primary {
        background: var(--cemig-green);
        color: white;
        border-color: var(--cemig-green);
        font-weight: 600;
      }
      .tour-tooltip .tour-btn.primary:hover {
        background: var(--cemig-green-dark);
      }
      .tour-tooltip .tour-skip {
        color: var(--text-secondary);
        background: transparent;
        border: none;
        cursor: pointer;
        font-size: 11px;
        text-decoration: underline;
      }
      .tour-arrow {
        position: absolute;
        width: 12px;
        height: 12px;
        background: white;
        transform: rotate(45deg);
        border-top: 3px solid var(--cemig-green);
        border-left: 0;
        border-right: 0;
      }

      /* Click hint cursor animation */
      .tour-click-hint {
        position: absolute;
        width: 36px;
        height: 36px;
        pointer-events: none;
        z-index: 1001;
        animation: tour-click 1.6s ease-in-out infinite;
      }
      @keyframes tour-click {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(0.85);
          opacity: 0.6;
        }
      }
      .tour-click-hint svg {
        filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.3));
      }

      /* Tour banner showing current submodule */
      .tour-banner {
        background: linear-gradient(
          90deg,
          var(--cemig-green),
          var(--cemig-green-dark)
        );
        color: white;
        padding: 6px 16px;
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 13px;
        flex-shrink: 0;
        position: relative;
        z-index: 50;
      }
      .tour-banner .tour-label {
        background: rgba(255, 255, 255, 0.18);
        padding: 2px 8px;
        border-radius: 10px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }
      .tour-banner .tour-title {
        font-weight: 600;
        flex: 1;
      }
      .tour-banner .tour-exit {
        background: rgba(255, 255, 255, 0.15);
        border: 1px solid rgba(255, 255, 255, 0.3);
        color: white;
        padding: 3px 10px;
        border-radius: 4px;
        font-size: 12px;
        cursor: pointer;
      }
      .tour-banner .tour-exit:hover {
        background: rgba(255, 255, 255, 0.25);
      }

      /* ===== DETAIL HEADER ===== */
      .det-header {
        display: flex;
        align-items: center;
        height: 48px;
        background: var(--surface);
        box-shadow: var(--header-shadow);
        padding: 0 16px;
        gap: 12px;
        flex-shrink: 0;
      }
      .det-header .back-arrow {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        cursor: pointer;
        color: #515559;
        border-radius: 4px;
      }
      .det-header .back-arrow:hover {
        background: #eaecee;
      }
      .det-header .det-title {
        font-size: 16px;
        font-weight: 700;
        color: var(--text);
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
      }
      .det-header .spacer {
        flex: 1;
      }
      .det-header .icon-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        cursor: pointer;
        color: #515559;
      }
      .det-header .icon-btn:hover {
        background: #eaecee;
      }
      .det-header .avatar {
        width: 32px;
        height: 32px;
        background: #d6f0dd;
        color: #006830;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      /* ===== DETAIL TOOLBAR ===== */
      .det-toolbar {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 6px 16px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        overflow-x: auto;
      }
      .det-toolbar .menu-btn,
      .det-toolbar .tool-btn {
        display: inline-flex;
        align-items: center;
        height: 30px;
        padding: 0 8px;
        background: transparent;
        border: 1px solid transparent;
        border-radius: 4px;
        color: var(--link);
        font-size: 14px;
        cursor: pointer;
        gap: 4px;
        white-space: nowrap;
      }
      .det-toolbar .tool-btn:hover,
      .det-toolbar .menu-btn:hover {
        background: #e8f5ee;
      }
      .det-toolbar .tool-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 30px;
        height: 30px;
        border-radius: 4px;
        cursor: pointer;
        color: var(--link);
      }
      .det-toolbar .tool-icon:hover {
        background: #e8f5ee;
      }
      .det-toolbar .right {
        margin-left: auto;
        display: flex;
        gap: 4px;
        align-items: center;
      }
      .det-toolbar .sair-btn {
        color: var(--link);
        cursor: pointer;
        padding: 0 8px;
        font-size: 14px;
      }
      .det-toolbar .sair-btn:hover {
        text-decoration: underline;
      }
      .det-toolbar .divider {
        width: 1px;
        height: 20px;
        background: #d0d0d0;
        margin: 0 4px;
      }

      /* ===== DETAIL CONTENT ===== */
      .det-body {
        flex: 1;
        padding: 16px 24px;
        overflow: auto;
      }

      .header-fields {
        display: grid;
        grid-template-columns: 110px auto;
        gap: 6px 8px;
        align-items: center;
        margin-bottom: 12px;
        max-width: 720px;
      }
      .header-fields .label {
        text-align: right;
        color: var(--text);
        font-size: 13px;
      }
      .header-fields .value-row {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      /* SAP-style input (visual only, disabled) */
      .sap-input {
        border: none;
        border-bottom: 1px solid var(--border-strong);
        background: transparent;
        font: inherit;
        color: var(--text);
        padding: 2px 4px;
        height: 22px;
        outline: none;
        min-width: 0;
      }
      .sap-input:disabled,
      .sap-input:read-only {
        color: var(--text);
        -webkit-text-fill-color: var(--text);
        opacity: 1;
        cursor: default;
      }
      .sap-input.w-sm {
        width: 60px;
      }
      .sap-input.w-md {
        width: 110px;
      }
      .sap-input.w-lg {
        width: 180px;
      }
      .sap-input.w-xl {
        width: 360px;
      }
      .sap-input.w-full {
        width: 100%;
      }
      .sap-input.highlighted {
        background: var(--highlight-bg);
        border-bottom: 1px solid var(--link);
      }
      .sap-input.required {
        border-bottom: 1px solid #ccaa44;
        background: #fef7e5;
      }

      /* SAP-style select (visual) */
      .sap-select {
        display: inline-flex;
        align-items: center;
        justify-content: space-between;
        gap: 4px;
        border: none;
        border-bottom: 1px solid var(--border-strong);
        background: transparent;
        color: var(--text);
        height: 22px;
        padding: 2px 4px;
        cursor: default;
        font: inherit;
      }
      .sap-select.w-sm {
        width: 60px;
      }
      .sap-select.w-md {
        width: 110px;
      }
      .sap-select.w-lg {
        width: 180px;
      }
      .sap-select.w-xl {
        width: 280px;
      }
      .sap-select > span:first-child {
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
        flex: 1;
      }
      .sap-select .chev {
        color: #515559;
        flex-shrink: 0;
      }

      /* SAP-style radio (visual) */
      .sap-radio-row {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        color: var(--text);
        cursor: default;
      }
      .sap-radio {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        border: 1px solid var(--border-strong);
        background: white;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .sap-radio.checked {
        border-color: var(--link);
      }
      .sap-radio.checked .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--link);
      }

      .sap-link {
        color: var(--link);
        cursor: pointer;
        text-decoration: none;
      }
      .sap-link:hover {
        text-decoration: underline;
      }
      .sap-link.disabled {
        color: var(--text-secondary);
        cursor: default;
      }
      .sap-link.disabled:hover {
        text-decoration: none;
      }

      .icon-small {
        color: var(--link);
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 18px;
        height: 18px;
      }
      .icon-small:hover {
        background: #e8f5ee;
        border-radius: 3px;
      }

      /* ===== MAIN TABS ===== */
      .main-tabs {
        display: flex;
        border-bottom: 1px solid var(--border);
        margin-bottom: 8px;
        overflow-x: auto;
      }
      .main-tabs .tab {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 16px;
        cursor: pointer;
        color: var(--link);
        font-size: 14px;
        border-bottom: 3px solid transparent;
        margin-bottom: -1px;
        white-space: nowrap;
      }
      .main-tabs .tab:hover {
        background: #f3f9ff;
      }
      .main-tabs .tab.active {
        color: var(--link);
        font-weight: 600;
        border-bottom-color: var(--link);
      }
      .main-tabs .tab-icon {
        display: inline-flex;
        color: var(--link);
      }

      /* ===== SUB TABS ===== */
      .sub-tabs {
        display: flex;
        border-bottom: 1px solid var(--border);
        margin-bottom: 16px;
        overflow-x: auto;
        padding-left: 8px;
      }
      .sub-tabs .stab {
        display: inline-flex;
        padding: 6px 12px;
        cursor: pointer;
        color: var(--text-secondary);
        font-size: 13px;
        border-bottom: 3px solid transparent;
        margin-bottom: -1px;
        white-space: nowrap;
      }
      .sub-tabs .stab:hover {
        color: var(--link);
      }
      .sub-tabs .stab.active {
        color: var(--link);
        font-weight: 600;
        border-bottom-color: var(--link);
      }

      /* ===== FORM SECTIONS ===== */
      .section {
        margin-bottom: 24px;
      }
      .section-title {
        font-size: 14px;
        font-weight: 700;
        color: var(--text);
        padding: 6px 0;
        border-bottom: 1px solid var(--border);
        margin-bottom: 12px;
      }

      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px 32px;
        max-width: 1180px;
      }
      .field-row {
        display: grid;
        grid-template-columns: 200px 1fr;
        align-items: center;
        gap: 8px;
        min-height: 26px;
      }
      .field-row .label {
        text-align: right;
        color: var(--text);
        font-size: 13px;
      }
      .field-row .label.required::after {
        content: "*";
        color: #b8231d;
        margin-left: 2px;
      }

      .inline-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .checkbox-row {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        color: var(--text);
      }
      .sap-checkbox {
        width: 14px;
        height: 14px;
        border: 1px solid var(--border-strong);
        background: white;
        display: inline-block;
        flex-shrink: 0;
      }

      /* ===== BUTTONS ===== */
      .btn-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 12px;
        margin-bottom: 12px;
      }
      .sap-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        height: 30px;
        padding: 0 12px;
        background: var(--surface);
        border: 1px solid var(--button-border);
        border-radius: 4px;
        color: var(--link);
        font: inherit;
        cursor: pointer;
        font-size: 13px;
      }
      .sap-btn:hover:not(:disabled) {
        background: #e8f5ee;
        border-color: var(--link);
      }
      .sap-btn:disabled {
        color: var(--text-disabled);
        cursor: not-allowed;
        background: #f7f7f7;
      }
      .sap-btn.primary {
        background: var(--link);
        color: white;
        border-color: var(--link);
      }
      .sap-btn.primary:hover {
        background: var(--link-hover);
        border-color: var(--link-hover);
      }

      /* ===== REPACTUAÇÃO TABLE ===== */
      .repac-wrap {
        margin-top: 6px;
      }
      .repac-label {
        font-size: 13px;
        color: var(--text);
        margin-bottom: 4px;
      }
      .repac-table {
        border: 1px solid var(--border);
        width: 100%;

        flex: 1;

      function makeRng(seed) {
        let t = seed >>> 0;
        return function () {
          t = (t + 0x6d2b79f5) >>> 0;
          let x = Math.imul(t ^ (t >>> 15), 1 | t);
          x = (x + Math.imul(x ^ (x >>> 7), 61 | x)) ^ x;
          return ((x ^ (x >>> 14)) >>> 0) / 4294967296;
        };
      }
      function hashStr(s) {
        let h = 2166136261 >>> 0;
        for (let i = 0; i < s.length; i++) {
          h ^= s.charCodeAt(i);
          h = Math.imul(h, 16777619);
        }
        return h >>> 0;
      }
      const pick = (rng, arr) => arr[Math.floor(rng() * arr.length)];
      const padNum = (n, len) => String(n).padStart(len, "0");

        const lng = -(43 + rng() * 2).toFixed(7);

        // Cargas/medidas
        const cargaKw = (rng() * 50).toFixed(1).replace(".", ",");

          seedKey: String(seedKey),

          return {
            id: baseId + "190" + String(i + 1).padStart(3, "0"),

            grpCodigo: m.grp,
            codigo: m.cod,
            texto: m.desc,

      /* ============ PROGRESS STORAGE (localStorage) ============ */
      const PROGRESS_KEY = "cemig-training-progress-v1";

      function loadProgress() {
        try {
          const raw = localStorage.getItem(PROGRESS_KEY);
          return raw ? JSON.parse(raw) : {};
        } catch {
          return {};
        }
      }
      function saveProgress(p) {
        try {
          localStorage.setItem(PROGRESS_KEY, JSON.stringify(p));
        } catch {}
      }
      /** progress shape: { [trainingId]: { [submoduleId]: true } } */
      function trainingProgress(progress, training) {
        if (!training.submodules || training.submodules.length === 0) {
          return { done: progress[training.id]?.__done ? 1 : 0, total: 1 };
        }
        const completed = training.submodules.filter(
          (s) => progress[training.id]?.[s.id],
        ).length;
        return { done: completed, total: training.submodules.length };
      }
      function totalProgress(progress) {
        let done = 0,
          total = 0;
        TRAININGS.forEach((t) => {
          const p = trainingProgress(progress, t);
          done += p.done;
          total += p.total;
        });
        return {
          done,
          total,
          pct: total ? Math.round((done / total) * 100) : 0,
        };
      }

      /* ============ TOUR SPOTLIGHT (global overlay) ============ */
      function TourSpotlight({ tour }) {
        const [rect, setRect] = useState(null);

        React.useEffect(() => {
          if (!tour) return;
          const step = tour.steps[tour.currentStep];
          if (!step || !step.target) {
            setRect(null);
            return;
          }

          // Poll for the element to appear (handles re-renders)
          let cancelled = false;
          let attempts = 0;
          const find = () => {
            if (cancelled) return;
            const el = document.querySelector(
              `[data-tour-id="${step.target}"]`,
            );
            if (el) {
              // Scroll the element into view if it's offscreen,
              // so the spotlight + tooltip fit within the viewport.
              const r0 = el.getBoundingClientRect();
              const vh = window.innerHeight;
              const margin = 200; // leave room for tooltip
              if (r0.top < 60 || r0.bottom > vh - margin) {
                el.scrollIntoView({ block: "center", behavior: "smooth" });
                // wait a tick for scroll, then re-measure
                setTimeout(() => {
                  if (cancelled) return;
                  const r2 = el.getBoundingClientRect();
                  setRect({
                    left: r2.left,
                    top: r2.top,
                    width: r2.width,
                    height: r2.height,
                  });
                }, 250);
              } else {
                setRect({
                  left: r0.left,
                  top: r0.top,
                  width: r0.width,
                  height: r0.height,
                });
              }
              // Attach click handler ONLY if no waitFor is defined.
              // If waitFor is defined, the parent fires onTourEvent which advances the tour.
              // Having both would double-advance.
              if (step.advanceOn === "click" && !step.waitFor) {
                const handler = () => {
                  tour.onAdvance && tour.onAdvance();
                };
                el.addEventListener("click", handler, { once: true });
                return () => el.removeEventListener("click", handler);
              }
            } else if (attempts < 20) {
              attempts++;
              setTimeout(find, 80);
            }
          };
          find();

          // also update on resize/scroll
          const onResize = () => {
            const el = document.querySelector(
              `[data-tour-id="${step.target}"]`,
            );
            if (el) {
              const r = el.getBoundingClientRect();
              setRect({
                left: r.left,
                top: r.top,
                width: r.width,
                height: r.height,
              });
            }
          };
          window.addEventListener("resize", onResize);
          window.addEventListener("scroll", onResize, true);
          return () => {
            cancelled = true;
            window.removeEventListener("resize", onResize);
            window.removeEventListener("scroll", onResize, true);
          };
        }, [tour && tour.currentStep, tour && tour.steps]);

        if (!tour) return null;
        const step = tour.steps[tour.currentStep];
        if (!step) return null;

        // If no spotlight (intro step), show centered tooltip
        if (!rect) {
          return (
            <div
              className="tour-spotlight-overlay"
              style={{ pointerEvents: "auto" }}
            >
              <div className="tour-mask" />
              <div
                className="tour-tooltip"
                style={{
                  left: "50%",
                  top: "50%",
                  transform: "translate(-50%, -50%)",
                }}
              >
                <div className="step-label">Passo {tour.currentStep + 1}</div>
                <h4>{step.title}</h4>
                <p>{step.body}</p>
                <div className="tour-actions">
                  <span className="tour-progress">
                    {tour.currentStep + 1} / {tour.steps.length}
                  </span>
                  <div className="tour-buttons">
                    <button className="tour-skip" onClick={tour.onExit}>
                      Pular
                    </button>
                    <button
                      className="tour-btn primary"
                      onClick={tour.onAdvance}
                    >
                      {tour.currentStep === tour.steps.length - 1
                        ? "Concluir"
                        : "Avançar"}
                    </button>
                  </div>
                </div>
              </div>
            </div>
          );
        }

        // Tooltip positioning: prefer below the target, else above
        const VW = window.innerWidth;
        const VH = window.innerHeight;
        const ttWidth = 320;
        const ttHeight = 160;
        let ttLeft = rect.left + rect.width / 2 - ttWidth / 2;
        let ttTop = rect.top + rect.height + 16;
        let arrowOnTop = true;
        if (ttTop + ttHeight > VH - 16) {
          ttTop = rect.top - ttHeight - 16;
          arrowOnTop = false;
        }
        ttLeft = Math.max(12, Math.min(ttLeft, VW - ttWidth - 12));

        return (
          <div className="tour-spotlight-overlay">
            {/* SVG mask cutting out a rect around the target */}
            <svg
              width={VW}
              height={VH}
              style={{ position: "absolute", inset: 0, pointerEvents: "none" }}
            >
              <defs>
                <mask id="tour-mask-cut">
                  <rect width="100%" height="100%" fill="white" />
                  <rect
                    x={rect.left - 6}
                    y={rect.top - 6}
                    width={rect.width + 12}
                    height={rect.height + 12}
                    rx="6"
                    ry="6"
                    fill="black"
                  />
                </mask>
              </defs>
              <rect
                width="100%"
                height="100%"
                fill="rgba(0,0,0,0.5)"
                mask="url(#tour-mask-cut)"
              />
            </svg>

            <div
              className="tour-spotlight"
              style={{
                left: rect.left - 6,
                top: rect.top - 6,
                width: rect.width + 12,
                height: rect.height + 12,
              }}
            />

            <div
              className="tour-tooltip"
              style={{ left: ttLeft, top: ttTop, pointerEvents: "auto" }}
            >
              <div className="step-label">Passo {tour.currentStep + 1}</div>
              <h4>{step.title}</h4>
              <p>{step.body}</p>
              <div className="tour-actions">
                <span className="tour-progress">
                  {tour.currentStep + 1} / {tour.steps.length}
                </span>
                <div className="tour-buttons">
                  <button className="tour-skip" onClick={tour.onExit}>
                    Pular
                  </button>
                  {step.advanceOn !== "click" && (
                    <button
                      className="tour-btn primary"
                      onClick={tour.onAdvance}
                    >
                      {tour.currentStep === tour.steps.length - 1
                        ? "Concluir"
                        : "Avançar"}
                    </button>
                  )}
                  {step.advanceOn === "click" && (
                    <span
                      style={{
                        fontSize: 11,
                        color: "var(--text-secondary)",
                        fontStyle: "italic",
                      }}
                    >
                      Clique no item destacado
                    </span>
                  )}
                </div>
              </div>
            </div>
          </div>
        );
      }

      /* ============ APP ============ */
      function App() {
        // route: training-index | submodule-index | home | nota-input | nota-detail | solicitacao | text-editor
        const [route, setRoute] = useState({ page: "training-index" });
        const [seed, setSeed] = useState("1252714058");

        // Persistent progress
        const [progress, setProgress] = useState(() => loadProgress());
        const markSubmoduleDone = useCallback((trainingId, submoduleId) => {
          setProgress((prev) => {
            const next = {
              ...prev,
              [trainingId]: {
                ...(prev[trainingId] || {}),
                [submoduleId]: true,
              },
            };
            saveProgress(next);
            return next;
          });
        }, []);

        // Active submodule (controls tour and progress crediting)
        const [activeSubmodule, setActiveSubmodule] = useState(null);

        // Tour state
        const [tourStep, setTourStep] = useState(0);
        const [tourActive, setTourActive] = useState(false);
        const activeTour = useMemo(() => {
          if (!tourActive || !activeSubmodule) return null;
          return TOUR_STEPS[activeSubmodule.submoduleId] || null;
        }, [tourActive, activeSubmodule]);

        const dataset = useMemo(() => generateDataset(seed), [seed]);
        const visibleData = useMemo(
          () => ({
            ...dataset,
            notaNumero: seed.split("|")[0],
            notaServico: seed.split("|")[0],
          }),
          [dataset, seed],
        );

        // Text editor target (which medida is being edited)
        const [editorMedida, setEditorMedida] = useState(null);

        // === Navigation ===
        const goTrainingIndex = useCallback(() => {
          setActiveSubmodule(null);
          setTourActive(false);
          setTourStep(0);
          setRoute({ page: "training-index" });
        }, []);

        const openTraining = useCallback((trainingId) => {
          const t = TRAININGS.find((x) => x.id === trainingId);
          if (!t) return;
          setRoute({ page: "submodule-index", trainingId });
        }, []);

        const startSubmodule = useCallback((trainingId, submoduleId) => {
          setActiveSubmodule({ trainingId, submoduleId });
          setTourStep(0);
          setTourActive(!!TOUR_STEPS[submoduleId]);
          // sub1 starts on Dados Solicitação; sub2 and sub3 also start there
          // (the tour will guide users to switch tabs)
          setRoute({
            page: "nota-detail",
            trainingId,
            submoduleId,
            initialTab: "solicitacao",
          });
        }, []);

        const goHome = useCallback(() => setRoute({ page: "home" }), []);
        const goNotaInput = useCallback(
          () => setRoute({ page: "nota-input" }),
          [],
        );
        const goNotaDetail = useCallback((numero) => {
          setSeed(numero);
          setRoute({ page: "nota-detail" });
        }, []);
        const goSolicitacao = useCallback(
          () => setRoute({ page: "solicitacao" }),
          [],
        );
        const backToDetail = useCallback(
          () => setRoute({ page: "nota-detail" }),
          [],
        );

        const openTextEditor = useCallback((medida) => {
          setEditorMedida(medida);
          setRoute({ page: "text-editor" });
        }, []);
        const closeTextEditor = useCallback(
          () => setRoute({ page: "nota-detail" }),
          [],
        );

        // Exit current SAP flow (back to submodule index, marking sub as done if applicable)
        const exitFlow = useCallback(() => {
          if (activeSubmodule) {
            markSubmoduleDone(
              activeSubmodule.trainingId,
              activeSubmodule.submoduleId,
            );
            setTourActive(false);
            setTourStep(0);
            setRoute({
              page: "submodule-index",
              trainingId: activeSubmodule.trainingId,
            });
          } else {
            goTrainingIndex();
          }
        }, [activeSubmodule, markSubmoduleDone, goTrainingIndex]);

        const regenerate = useCallback(() => {
          const salt = String(Math.floor(Math.random() * 1e9));
          setSeed((prev) => {
            const base = prev.split("|")[0];
            return base + "|" + salt;
          });
        }, []);

        // === Tour controls ===
        const advanceTour = useCallback(() => {
          setTourStep((prev) => {
            const steps = activeTour?.steps || [];
            if (prev + 1 >= steps.length) {
              // last step → mark done and return to submodule index
              if (activeSubmodule) {
                markSubmoduleDone(
                  activeSubmodule.trainingId,
                  activeSubmodule.submoduleId,
                );
              }
              setTourActive(false);
              setRoute((r) =>
                activeSubmodule
                  ? {
                      page: "submodule-index",
                      trainingId: activeSubmodule.trainingId,
                    }
                  : { page: "training-index" },
              );
              return 0;
            }
            return prev + 1;
          });
        }, [activeTour, activeSubmodule, markSubmoduleDone]);

        const exitTour = useCallback(() => {
          setTourActive(false);
          setTourStep(0);
        }, []);

        // Handle events from NotaDetailPage to auto-advance tour
        const handleTourEvent = useCallback(
          (evt) => {
            if (!tourActive || !activeTour) return;
            const step = activeTour.steps[tourStep];
            if (!step || !step.waitFor) return;
            // simple shallow match
            const w = step.waitFor;
            const matches = Object.keys(w).every((k) => evt[k] === w[k]);
            if (matches) {
              // small delay so the UI can update before advancing
              setTimeout(() => advanceTour(), 200);
            }
          },
          [tourActive, activeTour, tourStep, advanceTour],
        );

        // Build the tour object passed to the banner / spotlight
        const tour = activeTour
          ? {
              title: activeTour.title,
              steps: activeTour.steps,
              currentStep: tourStep,
              onAdvance: advanceTour,
              onExit: exitTour,
            }
          : null;

        // === Routing ===
        let page;
        if (route.page === "training-index") {
          page = (
            <TrainingIndexPage
              progress={progress}
              onOpenTraining={openTraining}
            />
          );
        } else if (route.page === "submodule-index") {
          const training = TRAININGS.find((t) => t.id === route.trainingId);
          page = training ? (
            <SubmoduleIndexPage
              training={training}
              progress={progress}
              onBackToIndex={goTrainingIndex}
              onStartSubmodule={startSubmodule}
            />
          ) : (
            <TrainingIndexPage
              progress={progress}
              onOpenTraining={openTraining}
            />
          );
        } else if (route.page === "home") {
          page = (
            <HomePage onOpenModificar={goNotaInput} onBackToIndex={exitFlow} />
          );
        } else if (route.page === "nota-input") {
          page = (
            <NotaInputPage
              initialValue={seed.split("|")[0]}
              onBack={goHome}
              onSubmit={goNotaDetail}
            />
          );
        } else if (route.page === "nota-detail") {
          page = (
            <NotaDetailPage
              data={visibleData}
              onBack={exitFlow}
              onOpenSolicitacao={goSolicitacao}
              onRegenerate={regenerate}
              onOpenTextEditor={openTextEditor}
              initialTab={route.initialTab}
              tour={tour}
              onTourEvent={handleTourEvent}
            />
          );
        } else if (route.page === "solicitacao") {
          page = <SolicitacaoPage data={visibleData} onBack={backToDetail} />;
        } else if (route.page === "text-editor") {
          page = (
            <ModificarTextoMedidaPage
              medida={editorMedida}
              onBack={closeTextEditor}
            />
          );
        } else {
          page = null;
        }

        return (
          <Fragment>
            {tour && <TourBanner tour={tour} />}
            {page}
            {tour && <TourSpotlight tour={tour} />}
          </Fragment>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
