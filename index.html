<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SAP - Página inicial</title>
    <style>
      :root {
        --bg: #f5f6f7;
        --surface: #ffffff;
        --border: #d9d9d9;
        --border-strong: #b4b4b4;
        --text: #32363a;
        --text-secondary: #6a6d70;
        --text-disabled: #89919a;
        --link: #0a6ed1;
        --link-hover: #0854a0;
        --highlight-bg: #d3e8fd;
        --tab-active: #0a6ed1;
        --sap-blue-logo: #1b90ff;
        --sap-blue-dark: #003a6a;
        --button-bg: #ffffff;
        --button-border: #b3b3b3;
        --section-bg: #fafafa;
        --header-shadow: 0 1px 0 rgba(0, 0, 0, 0.08);
        --tile-shadow:
          0 0 0 1px rgba(0, 0, 0, 0.05), 0 1px 2px rgba(0, 0, 0, 0.04);
        --tile-shadow-hover:
          0 0 0 1px rgba(10, 110, 209, 0.3), 0 4px 12px rgba(0, 0, 0, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        font-family:
          "72",
          "72full",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Arial,
          sans-serif;
        font-size: 14px;
        color: var(--text);
        background: var(--bg);
        min-height: 100vh;
      }

      #root {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ===== HEADER (HOME) ===== */
      .home-header {
        display: flex;
        align-items: center;
        height: 48px;
        background: var(--surface);
        box-shadow: var(--header-shadow);
        padding: 0 16px;
        gap: 16px;
        flex-shrink: 0;
      }
      .home-header .sap-logo {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: var(--sap-blue-logo);
        color: white;
        font-weight: 700;
        font-size: 13px;
        width: 44px;
        height: 22px;
        letter-spacing: 0.5px;
        transform: skewX(-12deg);
        border-radius: 1px;
      }
      .home-header .sap-logo span {
        transform: skewX(12deg);
      }
      .home-header .page-title {
        font-size: 16px;
        font-weight: 400;
        color: var(--text);
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
      }
      .home-header .spacer {
        flex: 1;
      }
      .home-header .icon-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        cursor: pointer;
        color: #515559;
      }
      .home-header .icon-btn:hover {
        background: #eaecee;
      }
      .home-header .avatar {
        width: 32px;
        height: 32px;
        background: #d1eafe;
        color: #0854a0;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }

      /* ===== HOME SUB-BAR ===== */
      .home-subbar {
        display: flex;
        align-items: stretch;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 0 16px;
        height: 36px;
        flex-shrink: 0;
      }
      .home-subbar .hamburger {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        margin-top: 2px;
        margin-right: 12px;
        cursor: pointer;
        color: #515559;
        border-radius: 4px;
      }
      .home-subbar .hamburger:hover {
        background: #eaecee;
      }
      .home-subbar .home-tab {
        display: inline-flex;
        align-items: center;
        padding: 0 12px;
        font-size: 14px;
        color: var(--link);
        border-bottom: 3px solid var(--link);
        cursor: pointer;
        height: 100%;
        margin-bottom: -1px;
      }
      .home-subbar .home-tab-sep {
        display: inline-block;
        width: 1px;
        height: 18px;
        background: #d0d0d0;
        align-self: center;
        margin-left: 8px;
      }

      /* ===== HOME BODY ===== */
      .home-body {
        padding: 24px 32px;
        flex: 1;
      }
      .home-section-title {
        font-size: 18px;
        font-weight: 700;
        color: var(--text);
        margin: 0 0 16px 0;
      }
      .tile-row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }
      .tile {
        width: 176px;
        height: 176px;
        background: var(--surface);
        border-radius: 6px;
        padding: 14px;
        cursor: pointer;
        box-shadow: var(--tile-shadow);
        transition:
          box-shadow 120ms ease,
          transform 120ms ease;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .tile:hover {
        box-shadow: var(--tile-shadow-hover);
        transform: translateY(-1px);
      }
      .tile .tile-title {
        font-size: 14px;
        font-weight: 700;
        color: var(--text);
        line-height: 1.3;
      }
      .tile .tile-sub {
        font-size: 13px;
        color: var(--text-secondary);
        margin-top: 4px;
      }
      .tile .tile-foot {
        font-size: 12px;
        color: var(--text-secondary);
      }

      /* ===== DETAIL HEADER ===== */
      .det-header {
        display: flex;
        align-items: center;
        height: 48px;
        background: var(--surface);
        box-shadow: var(--header-shadow);
        padding: 0 16px;
        gap: 12px;
        flex-shrink: 0;
      }
      .det-header .back-arrow {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        cursor: pointer;
        color: #515559;
        border-radius: 4px;
      }
      .det-header .back-arrow:hover {
        background: #eaecee;
      }
      .det-header .det-title {
        font-size: 16px;
        font-weight: 700;
        color: var(--text);
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
      }
      .det-header .spacer {
        flex: 1;
      }
      .det-header .icon-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        cursor: pointer;
        color: #515559;
      }
      .det-header .icon-btn:hover {
        background: #eaecee;
      }
      .det-header .avatar {
        width: 32px;
        height: 32px;
        background: #d1eafe;
        color: #0854a0;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      /* ===== DETAIL TOOLBAR ===== */
      .det-toolbar {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 6px 16px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        overflow-x: auto;
      }
      .det-toolbar .menu-btn,
      .det-toolbar .tool-btn {
        display: inline-flex;
        align-items: center;
        height: 30px;
        padding: 0 8px;
        background: transparent;
        border: 1px solid transparent;
        border-radius: 4px;
        color: var(--link);
        font-size: 14px;
        cursor: pointer;
        gap: 4px;
        white-space: nowrap;
      }
      .det-toolbar .tool-btn:hover,
      .det-toolbar .menu-btn:hover {
        background: #ebf5fe;
      }
      .det-toolbar .tool-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 30px;
        height: 30px;
        border-radius: 4px;
        cursor: pointer;
        color: var(--link);
      }
      .det-toolbar .tool-icon:hover {
        background: #ebf5fe;
      }
      .det-toolbar .right {
        margin-left: auto;
        display: flex;
        gap: 4px;
        align-items: center;
      }
      .det-toolbar .sair-btn {
        color: var(--link);
        cursor: pointer;
        padding: 0 8px;
        font-size: 14px;
      }
      .det-toolbar .sair-btn:hover {
        text-decoration: underline;
      }
      .det-toolbar .divider {
        width: 1px;
        height: 20px;
        background: #d0d0d0;
        margin: 0 4px;
      }

      /* ===== DETAIL CONTENT ===== */
      .det-body {
        flex: 1;
        padding: 16px 24px;
        overflow: auto;
      }

      .header-fields {
        display: grid;
        grid-template-columns: 110px auto;
        gap: 6px 8px;
        align-items: center;
        margin-bottom: 12px;
        max-width: 720px;
      }
      .header-fields .label {
        text-align: right;
        color: var(--text);
        font-size: 13px;
      }
      .header-fields .value-row {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      /* SAP-style input (visual only, disabled) */
      .sap-input {
        border: none;
        border-bottom: 1px solid var(--border-strong);
        background: transparent;
        font: inherit;
        color: var(--text);
        padding: 2px 4px;
        height: 22px;
        outline: none;
        min-width: 0;
      }
      .sap-input:disabled,
      .sap-input:read-only {
        color: var(--text);
        -webkit-text-fill-color: var(--text);
        opacity: 1;
        cursor: default;
      }
      .sap-input.w-sm {
        width: 60px;
      }
      .sap-input.w-md {
        width: 110px;
      }
      .sap-input.w-lg {
        width: 180px;
      }
      .sap-input.w-xl {
        width: 360px;
      }
      .sap-input.w-full {
        width: 100%;
      }
      .sap-input.highlighted {
        background: var(--highlight-bg);
        border-bottom: 1px solid var(--link);
      }
      .sap-input.required {
        border-bottom: 1px solid #ccaa44;
        background: #fef7e5;
      }

      /* SAP-style select (visual) */
      .sap-select {
        display: inline-flex;
        align-items: center;
        justify-content: space-between;
        gap: 4px;
        border: none;
        border-bottom: 1px solid var(--border-strong);
        background: transparent;
        color: var(--text);
        height: 22px;
        padding: 2px 4px;
        cursor: default;
        font: inherit;
      }
      .sap-select.w-sm {
        width: 60px;
      }
      .sap-select.w-md {
        width: 110px;
      }
      .sap-select.w-lg {
        width: 180px;
      }
      .sap-select.w-xl {
        width: 280px;
      }
      .sap-select > span:first-child {
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
        flex: 1;
      }
      .sap-select .chev {
        color: #515559;
        flex-shrink: 0;
      }

      /* SAP-style radio (visual) */
      .sap-radio-row {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        color: var(--text);
        cursor: default;
      }
      .sap-radio {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        border: 1px solid var(--border-strong);
        background: white;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .sap-radio.checked {
        border-color: var(--link);
      }
      .sap-radio.checked .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--link);
      }

      .sap-link {
        color: var(--link);
        cursor: pointer;
        text-decoration: none;
      }
      .sap-link:hover {
        text-decoration: underline;
      }
      .sap-link.disabled {
        color: var(--text-secondary);
        cursor: default;
      }
      .sap-link.disabled:hover {
        text-decoration: none;
      }

      .icon-small {
        color: var(--link);
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 18px;
        height: 18px;
      }
      .icon-small:hover {
        background: #ebf5fe;
        border-radius: 3px;
      }

      /* ===== MAIN TABS ===== */
      .main-tabs {
        display: flex;
        border-bottom: 1px solid var(--border);
        margin-bottom: 8px;
        overflow-x: auto;
      }
      .main-tabs .tab {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 16px;
        cursor: pointer;
        color: var(--link);
        font-size: 14px;
        border-bottom: 3px solid transparent;
        margin-bottom: -1px;
        white-space: nowrap;
      }
      .main-tabs .tab:hover {
        background: #f3f9ff;
      }
      .main-tabs .tab.active {
        color: var(--link);
        font-weight: 600;
        border-bottom-color: var(--link);
      }
      .main-tabs .tab-icon {
        display: inline-flex;
        color: var(--link);
      }

      /* ===== SUB TABS ===== */
      .sub-tabs {
        display: flex;
        border-bottom: 1px solid var(--border);
        margin-bottom: 16px;
        overflow-x: auto;
        padding-left: 8px;
      }
      .sub-tabs .stab {
        display: inline-flex;
        padding: 6px 12px;
        cursor: pointer;
        color: var(--text-secondary);
        font-size: 13px;
        border-bottom: 3px solid transparent;
        margin-bottom: -1px;
        white-space: nowrap;
      }
      .sub-tabs .stab:hover {
        color: var(--link);
      }
      .sub-tabs .stab.active {
        color: var(--link);
        font-weight: 600;
        border-bottom-color: var(--link);
      }

      /* ===== FORM SECTIONS ===== */
      .section {
        margin-bottom: 24px;
      }
      .section-title {
        font-size: 14px;
        font-weight: 700;
        color: var(--text);
        padding: 6px 0;
        border-bottom: 1px solid var(--border);
        margin-bottom: 12px;
      }

      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px 32px;
        max-width: 1180px;
      }
      .field-row {
        display: grid;
        grid-template-columns: 200px 1fr;
        align-items: center;
        gap: 8px;
        min-height: 26px;
      }
      .field-row .label {
        text-align: right;
        color: var(--text);
        font-size: 13px;
      }
      .field-row .label.required::after {
        content: "*";
        color: #b8231d;
        margin-left: 2px;
      }

      .inline-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .checkbox-row {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        color: var(--text);
      }
      .sap-checkbox {
        width: 14px;
        height: 14px;
        border: 1px solid var(--border-strong);
        background: white;
        display: inline-block;
        flex-shrink: 0;
      }

      /* ===== BUTTONS ===== */
      .btn-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 12px;
        margin-bottom: 12px;
      }
      .sap-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        height: 30px;
        padding: 0 12px;
        background: var(--surface);
        border: 1px solid var(--button-border);
        border-radius: 4px;
        color: var(--link);
        font: inherit;
        cursor: pointer;
        font-size: 13px;
      }
      .sap-btn:hover:not(:disabled) {
        background: #ebf5fe;
        border-color: var(--link);
      }
      .sap-btn:disabled {
        color: var(--text-disabled);
        cursor: not-allowed;
        background: #f7f7f7;
      }
      .sap-btn.primary {
        background: var(--link);
        color: white;
        border-color: var(--link);
      }
      .sap-btn.primary:hover {
        background: var(--link-hover);
        border-color: var(--link-hover);
      }

      /* ===== REPACTUAÇÃO TABLE ===== */
      .repac-wrap {
        margin-top: 6px;
      }
      .repac-label {
        font-size: 13px;
        color: var(--text);
        margin-bottom: 4px;
      }
      .repac-table {
        border: 1px solid var(--border);
        width: 100%;
        max-width: 600px;
        height: 160px;
        background: #f7f7f7;
        display: grid;
        grid-template-columns: 200px 1fr;
      }
      .repac-table .col {
        border-right: 1px solid var(--border);
      }
      .repac-table .col:last-child {
        border-right: none;
      }
      .repac-table .row {
        height: 22px;
        border-bottom: 1px solid #ececec;
      }

      /* ===== DESCRIPTION ROW ===== */
      .desc-row {
        display: grid;
        grid-template-columns: 200px 1fr;
        gap: 8px;
        margin-top: 16px;
        align-items: start;
      }
      .desc-row .label {
        text-align: right;
        font-size: 13px;
        padding-top: 6px;
      }
      .desc-area {
        display: grid;
        grid-template-columns: 100px 1fr;
        gap: 8px;
        align-items: start;
      }
      .desc-textarea {
        border: 1px solid var(--border-strong);
        background: white;
        min-height: 80px;
        width: 100%;
        max-width: 720px;
        padding: 6px;
        font: inherit;
        color: var(--text);
        resize: vertical;
      }
      .desc-textarea:disabled,
      .desc-textarea:read-only {
        color: var(--text);
        -webkit-text-fill-color: var(--text);
        opacity: 1;
      }

      /* ===== FOOTER ===== */
      .det-footer {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 8px;
        padding: 8px 24px;
        background: var(--surface);
        border-top: 1px solid var(--border);
        flex-shrink: 0;
      }

      /* ===== NOTA INPUT SCREEN ===== */
      .nota-input-screen {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px;
      }
      .nota-card {
        background: var(--surface);
        border-radius: 6px;
        box-shadow: var(--tile-shadow);
        padding: 32px 40px;
        width: 100%;
        max-width: 460px;
      }
      .nota-card h2 {
        font-size: 18px;
        margin: 0 0 8px 0;
        color: var(--text);
        font-weight: 700;
      }
      .nota-card p {
        font-size: 13px;
        color: var(--text-secondary);
        margin: 0 0 24px 0;
      }
      .nota-card label {
        font-size: 13px;
        color: var(--text);
        display: block;
        margin-bottom: 6px;
      }
      .nota-card input {
        width: 100%;
        padding: 8px 10px;
        font: inherit;
        border: 1px solid var(--border-strong);
        border-radius: 4px;
        background: white;
        outline: none;
      }
      .nota-card input:focus {
        border-color: var(--link);
        box-shadow: 0 0 0 2px rgba(10, 110, 209, 0.15);
      }
      .nota-card .actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 24px;
      }

      /* ===== SOLICITAÇÃO PAGE ===== */
      .solic-toolbar .pill {
        border: 1px solid var(--button-border);
        background: var(--surface);
        height: 28px;
        padding: 0 12px;
        border-radius: 4px;
      }

      .solic-body {
        flex: 1;
        padding: 12px 24px;
        overflow: auto;
      }

      .solic-section {
        margin-bottom: 18px;
      }
      .solic-section-title {
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
        padding-bottom: 4px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 10px;
      }

      /* Flexible row of fields */
      .frow {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 6px 24px;
        margin-bottom: 6px;
        min-height: 26px;
      }
      .ffield {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .ffield .flabel {
        font-size: 13px;
        color: var(--text);
        text-align: right;
        white-space: nowrap;
      }
      .ffield .flabel.lw-sm {
        min-width: 70px;
      }
      .ffield .flabel.lw-md {
        min-width: 120px;
      }
      .ffield .flabel.lw-lg {
        min-width: 160px;
      }
      .ffield .flabel.lw-xl {
        min-width: 200px;
      }

      .status-box {
        background: #eef0f3;
        border: 1px solid #d9d9d9;
        border-radius: 2px;
        padding: 4px 10px;
        color: var(--text);
        font-size: 13px;
        min-height: 24px;
        flex: 1;
        min-width: 280px;
      }
      .frow .grow {
        flex: 1;
      }

      .sub-tabs.solic-tabs {
        padding-left: 0;
        margin-bottom: 0;
      }
      .sub-tabs.solic-tabs .stab {
        padding: 8px 16px;
        font-size: 14px;
      }

      /* Highlight stripe (gradient-like for sections background like image 2) */
      .solic-stripe {
        height: 1px;
        background: linear-gradient(
          to right,
          transparent,
          #e2e2e2,
          transparent
        );
        margin: 4px 0;
      }

      /* ===== BREADCRUMB / RETURN ===== */
      .demo-banner {
        background: #fffbe6;
        color: #6a5a18;
        font-size: 12px;
        padding: 4px 16px;
        border-bottom: 1px solid #ecdfa6;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.production.min.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel" data-presets="react">
      const { useState, useCallback, Fragment } = React;

      /* ============ ICONS (inline SVG) ============ */

      /* ============ APP ============ */
      function App() {
        const [route, setRoute] = useState({ page: "home" });

        const goHome = useCallback(() => setRoute({ page: "home" }), []);
        const goNotaInput = useCallback(
          () => setRoute({ page: "nota-input" }),
          [],
        );
        const goNotaDetail = useCallback(
          (numero) => setRoute({ page: "nota-detail", numero }),
          [],
        );
        const goSolicitacao = useCallback(
          () => setRoute((prev) => ({ ...prev, page: "solicitacao" })),
          [],
        );
        const backToDetail = useCallback(
          () =>
            setRoute((prev) => ({
              page: "nota-detail",
              numero: prev.numero || "1252714058",
            })),
          [],
        );

        if (route.page === "home") {
          return <HomePage onOpenModificar={goNotaInput} />;
        }
        if (route.page === "nota-input") {
          return <NotaInputPage onBack={goHome} onSubmit={goNotaDetail} />;
        }
        if (route.page === "nota-detail") {
          return (
            <NotaDetailPage
              notaNumero={route.numero}
              onBack={goHome}
              onOpenSolicitacao={goSolicitacao}
            />
          );
        }
        if (route.page === "solicitacao") {
          return <SolicitacaoPage onBack={backToDetail} />;
        }
        return null;
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
