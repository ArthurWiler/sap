<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Treinamento - Página inicial</title>
    <style>
      :root {
        --bg: #f5f6f7;
        --surface: #ffffff;
        --border: #d9d9d9;
        --border-strong: #b4b4b4;
        --text: #32363a;
        --text-secondary: #6a6d70;
        --text-disabled: #89919a;
        /* CEMIG green palette */
        --link: #00833e;
        --link-hover: #006830;
        --link-light: #76bc21;
        --highlight-bg: #d6f0dd;
        --tab-active: #00833e;
        /* SAP brand logo stays SAP blue, not CEMIG */
        --sap-blue-logo: #1b90ff;
        --sap-blue-dark: #003a6a;
        /* CEMIG accent for app chrome */
        --cemig-green: #00833e;
        --cemig-green-dark: #004d24;
        --cemig-green-light: #76bc21;
        --button-bg: #ffffff;
        --button-border: #b3b3b3;
        --section-bg: #fafafa;
        --header-shadow: 0 1px 0 rgba(0, 0, 0, 0.08);
        --tile-shadow:
          0 0 0 1px rgba(0, 0, 0, 0.05), 0 1px 2px rgba(0, 0, 0, 0.04);
        --tile-shadow-hover:
          0 0 0 1px rgba(0, 131, 62, 0.3), 0 4px 12px rgba(0, 131, 62, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        font-family:
          "72",
          "72full",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Arial,
          sans-serif;
        font-size: 14px;
        color: var(--text);
        background: var(--bg);
        min-height: 100vh;
      }

      #root {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ===== HEADER (HOME) ===== */
      .home-header {
        display: flex;
        align-items: center;
        height: 48px;
        background: var(--surface);
        box-shadow: var(--header-shadow);
        padding: 0 16px;
        gap: 16px;
        flex-shrink: 0;
      }
      .home-header .sap-logo {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: var(--sap-blue-logo);
        color: white;
        font-weight: 700;
        font-size: 13px;
        width: 44px;
        height: 22px;
        letter-spacing: 0.5px;
        transform: skewX(-12deg);
        border-radius: 1px;
      }
      .home-header .sap-logo span {
        transform: skewX(12deg);
      }
      .home-header .page-title {
        font-size: 16px;
        font-weight: 400;
        color: var(--text);
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
      }
      .home-header .spacer {
        flex: 1;
      }
      .home-header .icon-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        cursor: pointer;
        color: #515559;
      }
      .home-header .icon-btn:hover {
        background: #eaecee;
      }
      .home-header .avatar {
        width: 32px;
        height: 32px;
        background: #d6f0dd;
        color: #006830;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }

      /* ===== HOME SUB-BAR ===== */
      .home-subbar {
        display: flex;
        align-items: stretch;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 0 16px;
        height: 36px;
        flex-shrink: 0;
      }
      .home-subbar .hamburger {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        margin-top: 2px;
        margin-right: 12px;
        cursor: pointer;
        color: #515559;
        border-radius: 4px;
      }
      .home-subbar .hamburger:hover {
        background: #eaecee;
      }
      .home-subbar .home-tab {
        display: inline-flex;
        align-items: center;
        padding: 0 12px;
        font-size: 14px;
        color: var(--link);
        border-bottom: 3px solid var(--link);
        cursor: pointer;
        height: 100%;
        margin-bottom: -1px;
      }
      .home-subbar .home-tab-sep {
        display: inline-block;
        width: 1px;
        height: 18px;
        background: #d0d0d0;
        align-self: center;
        margin-left: 8px;
      }

      /* ===== HOME BODY ===== */
      .home-body {
        padding: 24px 32px;
        flex: 1;
      }
      .home-section-title {
        font-size: 18px;
        font-weight: 700;
        color: var(--text);
        margin: 0 0 16px 0;
      }
      .tile-row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }
      .tile {
        width: 176px;
        height: 176px;
        background: var(--surface);
        border-radius: 6px;
        padding: 14px;
        cursor: pointer;
        box-shadow: var(--tile-shadow);
        transition:
          box-shadow 120ms ease,
          transform 120ms ease;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .tile:hover {
        box-shadow: var(--tile-shadow-hover);
        transform: translateY(-1px);
      }
      .tile .tile-title {
        font-size: 14px;
        font-weight: 700;
        color: var(--text);
        line-height: 1.3;
      }
      .tile .tile-sub {
        font-size: 13px;
        color: var(--text-secondary);
        margin-top: 4px;
      }
      .tile .tile-foot {
        font-size: 12px;
        color: var(--text-secondary);
      }

      /* ===== TRAINING INDEX ===== */
      .training-page {
        flex: 1;
        background: linear-gradient(180deg, #f3f8f5 0%, #e6efe8 100%);
        overflow: auto;
      }
      .training-hero {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 28px 40px;
        display: flex;
        align-items: center;
        gap: 20px;
      }
      .training-hero .hero-mark {
        width: 56px;
        height: 56px;
        background: linear-gradient(
          135deg,
          var(--cemig-green-light),
          var(--cemig-green)
        );
        color: white;
        border-radius: 12px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        font-weight: 700;
        box-shadow: 0 4px 12px rgba(0, 131, 62, 0.25);
      }
      .training-hero h1 {
        margin: 0 0 4px 0;
        font-size: 22px;
        color: var(--text);
        font-weight: 700;
      }
      .training-hero p {
        margin: 0;
        font-size: 14px;
        color: var(--text-secondary);
      }
      .training-body {
        padding: 32px 40px;
        max-width: 1100px;
        margin: 0 auto;
      }
      .training-section-title {
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        color: var(--text-secondary);
        margin: 0 0 12px 4px;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .training-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 16px;
      }
      .training-card {
        background: var(--surface);
        border-radius: 10px;
        padding: 18px 18px 16px;
        box-shadow:
          0 1px 2px rgba(0, 0, 0, 0.04),
          0 0 0 1px rgba(0, 0, 0, 0.04);
        transition:
          box-shadow 150ms ease,
          transform 150ms ease;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        position: relative;
        min-height: 160px;
      }
      .training-card.available:hover {
        box-shadow:
          0 4px 16px rgba(0, 131, 62, 0.12),
          0 0 0 1px rgba(0, 131, 62, 0.25);
        transform: translateY(-2px);
      }
      .training-card.locked {
        opacity: 0.62;
        cursor: not-allowed;
      }
      .training-card .card-icon {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        background: #e8f5ee;
        color: var(--link);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 10px;
      }
      .training-card.locked .card-icon {
        background: #ececec;
        color: #8a8d90;
      }
      .training-card h3 {
        margin: 0 0 6px 0;
        font-size: 15px;
        font-weight: 700;
        color: var(--text);
        line-height: 1.3;
      }
      .training-card p {
        margin: 0;
        font-size: 13px;
        color: var(--text-secondary);
        line-height: 1.45;
        flex: 1;
      }
      .training-tags {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-top: 12px;
      }
      .training-tag {
        font-size: 11px;
        background: #f0f3f7;
        color: var(--text-secondary);
        padding: 2px 8px;
        border-radius: 10px;
      }
      .training-card .start-link {
        margin-top: 12px;
        color: var(--link);
        font-size: 13px;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }
      .training-card.locked .start-link {
        color: #999;
      }
      .locked-badge {
        position: absolute;
        top: 12px;
        right: 12px;
        background: #f0f3f7;
        color: #6a6d70;
        font-size: 10px;
        padding: 3px 8px;
        border-radius: 10px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        font-weight: 600;
      }

      /* ===== TRAINING TOP BAR ===== */
      .training-topbar {
        height: 44px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        padding: 0 20px;
        gap: 12px;
        flex-shrink: 0;
        border-top: 3px solid var(--cemig-green);
      }
      .training-topbar .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--text);
        font-weight: 700;
        font-size: 14px;
      }
      .training-topbar .cemig-mark {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        border-radius: 6px;
        background: linear-gradient(
          135deg,
          var(--cemig-green-light),
          var(--cemig-green)
        );
        color: white;
        font-weight: 800;
        font-size: 14px;
        box-shadow: 0 1px 3px rgba(0, 131, 62, 0.3);
      }
      .training-topbar .spacer {
        flex: 1;
      }
      .training-topbar .breadcrumb-link {
        color: var(--link);
        cursor: pointer;
        font-size: 13px;
      }
      .training-topbar .breadcrumb-link:hover {
        text-decoration: underline;
      }

      /* Difficulty groups */
      .training-group {
        margin-bottom: 28px;
      }
      .diff-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #ccc;
      }
      .diff-dot.diff-iniciante {
        background: #76bc21;
      }
      .diff-dot.diff-intermediario {
        background: #f0a020;
      }
      .diff-dot.diff-avancado {
        background: #c8412c;
      }

      /* Platform badge */
      .platform-badge {
        position: absolute;
        top: 12px;
        right: 12px;
        background: var(--cemig-green);
        color: white;
        font-size: 10px;
        padding: 3px 8px;
        border-radius: 10px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }
      /* When both locked-badge and platform-badge present, stack them */
      .training-card .platform-badge ~ .locked-badge,
      .training-card .locked-badge + .platform-badge {
        /* if both, locked goes above the platform badge */
      }
      .training-card.locked .platform-badge {
        top: 38px; /* push below the EM BREVE badge */
        background: #aeb8b0;
      }

      /* Submodules tag */
      .submods-tag {
        background: #e6f3ec !important;
        color: var(--cemig-green-dark) !important;
        display: inline-flex !important;
        align-items: center;
        gap: 3px;
        font-weight: 600;
      }

      /* ===== PROGRESS BAR ===== */
      .progress-wrap {
        margin-top: 10px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .progress-bar {
        flex: 1;
        height: 6px;
        background: #e9ecef;
        border-radius: 3px;
        overflow: hidden;
        position: relative;
      }
      .progress-bar .fill {
        height: 100%;
        background: linear-gradient(
          90deg,
          var(--cemig-green-light),
          var(--cemig-green)
        );
        border-radius: 3px;
        transition: width 300ms ease;
      }
      .progress-label {
        font-size: 11px;
        color: var(--text-secondary);
        font-weight: 600;
        min-width: 36px;
        text-align: right;
      }
      /* Big progress (hero) */
      .hero-progress {
        margin-top: 12px;
        display: flex;
        align-items: center;
        gap: 12px;
        max-width: 460px;
      }
      .hero-progress .progress-bar {
        height: 8px;
      }
      .hero-progress .progress-label {
        font-size: 13px;
        color: var(--text);
      }

      /* ===== SUBMODULE PAGE ===== */
      .sub-hero {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 24px 40px;
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .sub-hero .back-circle {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: #f0f3f5;
        color: #515559;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        flex-shrink: 0;
        transition: background 150ms ease;
      }
      .sub-hero .back-circle:hover {
        background: var(--cemig-green);
        color: white;
      }
      .sub-hero h1 {
        margin: 0 0 4px 0;
        font-size: 20px;
        color: var(--text);
        font-weight: 700;
      }
      .sub-hero .crumb {
        color: var(--text-secondary);
        font-size: 13px;
        margin-bottom: 2px;
      }
      .sub-hero .difficulty-pill {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 2px 10px;
        background: #f0f3f5;
        border-radius: 10px;
        font-size: 11px;
        font-weight: 600;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-left: 8px;
        vertical-align: middle;
      }

      .sub-body {
        padding: 24px 40px;
        max-width: 900px;
        margin: 0 auto;
      }
      .sub-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .sub-item {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 16px 20px;
        display: flex;
        align-items: center;
        gap: 16px;
        cursor: pointer;
        transition:
          box-shadow 150ms ease,
          border-color 150ms ease,
          transform 150ms ease;
      }
      .sub-item:hover {
        border-color: var(--cemig-green);
        box-shadow: 0 2px 10px rgba(0, 131, 62, 0.08);
        transform: translateY(-1px);
      }
      .sub-item.locked {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .sub-item.locked:hover {
        border-color: var(--border);
        box-shadow: none;
        transform: none;
      }
      .sub-item .sub-num {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: #f0f3f5;
        color: var(--text-secondary);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 13px;
        flex-shrink: 0;
      }
      .sub-item.done .sub-num {
        background: var(--cemig-green);
        color: white;
      }
      .sub-item .sub-content {
        flex: 1;
        min-width: 0;
      }
      .sub-item h3 {
        margin: 0 0 2px 0;
        font-size: 15px;
        color: var(--text);
        font-weight: 600;
      }
      .sub-item p {
        margin: 0;
        color: var(--text-secondary);
        font-size: 13px;
      }
      .sub-item .sub-action {
        color: var(--link);
        font-size: 13px;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }
      .sub-item.locked .sub-action {
        color: var(--text-disabled);
      }

      /* "Voltar" button used in headers */
      .back-btn-pill {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        height: 28px;
        padding: 0 12px;
        background: white;
        border: 1px solid var(--button-border);
        border-radius: 14px;
        color: var(--text-secondary);
        cursor: pointer;
        font-size: 13px;
        transition: all 150ms ease;
      }
      .back-btn-pill:hover {
        border-color: var(--cemig-green);
        color: var(--cemig-green);
      }

      /* ===== DETAIL HEADER ===== */
      .det-header {
        display: flex;
        align-items: center;
        height: 48px;
        background: var(--surface);
        box-shadow: var(--header-shadow);
        padding: 0 16px;
        gap: 12px;
        flex-shrink: 0;
      }
      .det-header .back-arrow {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        cursor: pointer;
        color: #515559;
        border-radius: 4px;
      }
      .det-header .back-arrow:hover {
        background: #eaecee;
      }
      .det-header .det-title {
        font-size: 16px;
        font-weight: 700;
        color: var(--text);
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
      }
      .det-header .spacer {
        flex: 1;
      }
      .det-header .icon-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        cursor: pointer;
        color: #515559;
      }
      .det-header .icon-btn:hover {
        background: #eaecee;
      }
      .det-header .avatar {
        width: 32px;
        height: 32px;
        background: #d6f0dd;
        color: #006830;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      /* ===== DETAIL TOOLBAR ===== */
      .det-toolbar {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 6px 16px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        overflow-x: auto;
      }
      .det-toolbar .menu-btn,
      .det-toolbar .tool-btn {
        display: inline-flex;
        align-items: center;
        height: 30px;
        padding: 0 8px;
        background: transparent;
        border: 1px solid transparent;
        border-radius: 4px;
        color: var(--link);
        font-size: 14px;
        cursor: pointer;
        gap: 4px;
        white-space: nowrap;
      }
      .det-toolbar .tool-btn:hover,
      .det-toolbar .menu-btn:hover {
        background: #e8f5ee;
      }
      .det-toolbar .tool-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 30px;
        height: 30px;
        border-radius: 4px;
        cursor: pointer;
        color: var(--link);
      }
      .det-toolbar .tool-icon:hover {
        background: #e8f5ee;
      }
      .det-toolbar .right {
        margin-left: auto;
        display: flex;
        gap: 4px;
        align-items: center;
      }
      .det-toolbar .sair-btn {
        color: var(--link);
        cursor: pointer;
        padding: 0 8px;
        font-size: 14px;
      }
      .det-toolbar .sair-btn:hover {
        text-decoration: underline;
      }
      .det-toolbar .divider {
        width: 1px;
        height: 20px;
        background: #d0d0d0;
        margin: 0 4px;
      }

      /* ===== DETAIL CONTENT ===== */
      .det-body {
        flex: 1;
        padding: 16px 24px;
        overflow: auto;
      }

      .header-fields {
        display: grid;
        grid-template-columns: 110px auto;
        gap: 6px 8px;
        align-items: center;
        margin-bottom: 12px;
        max-width: 720px;
      }
      .header-fields .label {
        text-align: right;
        color: var(--text);
        font-size: 13px;
      }
      .header-fields .value-row {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      /* SAP-style input (visual only, disabled) */
      .sap-input {
        border: none;
        border-bottom: 1px solid var(--border-strong);
        background: transparent;
        font: inherit;
        color: var(--text);
        padding: 2px 4px;
        height: 22px;
        outline: none;
        min-width: 0;
      }
      .sap-input:disabled,
      .sap-input:read-only {
        color: var(--text);
        -webkit-text-fill-color: var(--text);
        opacity: 1;
        cursor: default;
      }
      .sap-input.w-sm {
        width: 60px;
      }
      .sap-input.w-md {
        width: 110px;
      }
      .sap-input.w-lg {
        width: 180px;
      }
      .sap-input.w-xl {
        width: 360px;
      }
      .sap-input.w-full {
        width: 100%;
      }
      .sap-input.highlighted {
        background: var(--highlight-bg);
        border-bottom: 1px solid var(--link);
      }
      .sap-input.required {
        border-bottom: 1px solid #ccaa44;
        background: #fef7e5;
      }

      /* SAP-style select (visual) */
      .sap-select {
        display: inline-flex;
        align-items: center;
        justify-content: space-between;
        gap: 4px;
        border: none;
        border-bottom: 1px solid var(--border-strong);
        background: transparent;
        color: var(--text);

      const RUA_PREFIX = ["RUA", "AV", "TRAVESSA", "ALAMEDA", "PRAÇA"];

      /* PRNG seedable (Mulberry32) */
      function makeRng(seed) {
        let t = seed >>> 0;
        return function () {
          t = (t + 0x6d2b79f5) >>> 0;
          let x = Math.imul(t ^ (t >>> 15), 1 | t);
          x = (x + Math.imul(x ^ (x >>> 7), 61 | x)) ^ x;
          return ((x ^ (x >>> 14)) >>> 0) / 4294967296;
        };
      }
      function hashStr(s) {
        let h = 2166136261 >>> 0;
        for (let i = 0; i < s.length; i++) {
          h ^= s.charCodeAt(i);
          h = Math.imul(h, 16777619);
        }
        return h >>> 0;
      }
      const pick = (rng, arr) => arr[Math.floor(rng() * arr.length)];
      const padNum = (n, len) => String(n).padStart(len, "0");
      const randDigits = (rng, len) => {
        let s = "";
        for (let i = 0; i < len; i++) s += Math.floor(rng() * 10);

      const formatDateBR = (d) => {
        const dd = String(d.getDate()).padStart(2, "0");

        return `${dd}.${mm}.${yy}`;

          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .split(" ")
          .filter(Boolean)
          .slice(0, 2)
          .join("");

      /**
       * Build a full dataset deterministically from a seed key (e.g. nota number).
       * Same seed → same dataset, every time.
       */

        const rng = makeRng(hashStr(String(seedKey)));

        const isFem = rng() < 0.55;
        const nome = pick(rng, isFem ? NOMES_F : NOMES_M);
        const slug = slugifyName(nome);

        const tipoServ = pick(rng, TIPOS_SERV);
        const statusNota = pick(rng, STATUS_NOTA);

        const tipoLig = pick(rng, TIPOS_LIG);
        const grupo = pick(rng, GRUPOS);

        const ruaNome = pick(rng, SOBRENOMES_RUA);
        const ruaPref = pick(rng, RUA_PREFIX);
        const numCasa = String(Math.floor(rng() * 999) + 1);

        // Reference date: between today-180d and today+30d
        const today = new Date(2026, 4, 25); // May 25 2026 (matches our cutoff context)
        const dtOffset = Math.floor(rng() * 210) - 30;
        const dtStatus = new Date(today.getTime() + dtOffset * 86400000);

        const possuiCadunico = pick(rng, SIM_NAO);
        const cadAtualizado = pick(rng, SIM_NAO);
        const padraoPronto = pick(rng, SIM_NAO);

        // Disjuntor geral radio choice
        const disjOpt = ["com", "sem", "estimado", "projeto"][
          Math.floor(rng() * 4)
        ];

        // Latitude/longitude near Sete Lagoas / Belo Horizonte
        const lat = -(19 + rng() * 2).toFixed(7);
        const lng = -(43 + rng() * 2).toFixed(7);

        // Cargas/medidas
        const cargaKw = (rng() * 50).toFixed(1).replace(".", ",");
        const consumoEst = String(Math.floor(rng() * 800));

        return {
          seedKey: String(seedKey),
          // Nota
          notaNumero: String(seedKey),
          notaTipo: "EO",
          notaTipoDesc: "Consumidor de BT",
          statusP1: statusNota.p1,
          statusP2: statusNota.p2,
          tipoNota: "ZCUM01 - Solic de Obra",
          dataCriacao: formatDateBR(dtStatus),

          // Dados Comp (image 3)
          modalidade: "CEMIG",
          mercado,
          nivelTensaoUC: pick(rng, ["BT1", "BT2", "MT3", "MT5"]),
          tipoAtendimento: String(Math.floor(rng() * 5)),
          enquadramentoReg: String(Math.floor(rng() * 4)),
          tipoObra: String(Math.floor(rng() * 6)),
          universalizacao: String(Math.floor(rng() * 2)),
          programa: String(Math.floor(rng() * 3)),
          tensaoObjetivo: pick(rng, ["127/220", "220/380", "13800"]),
          microObjetivo: pick(rng, ["LIG-N", "LIG-A", "REL", "TRF"]),
          objetivo: pick(rng, ["NOVA", "AMPL", "SUBS", "RELI"]),

      const PROGRESS_KEY = "cemig-training-progress-v1";

      function loadProgress() {
        try {
          const raw = localStorage.getItem(PROGRESS_KEY);
          return raw ? JSON.parse(raw) : {};
        } catch {
          return {};
        }
      }
      function saveProgress(p) {
        try {
          localStorage.setItem(PROGRESS_KEY, JSON.stringify(p));
        } catch {}
      }
      /** progress shape: { [trainingId]: { [submoduleId]: true } } */
      function trainingProgress(progress, training) {
        if (!training.submodules || training.submodules.length === 0) {
          return { done: progress[training.id]?.__done ? 1 : 0, total: 1 };
        }
        const completed = training.submodules.filter(
          (s) => progress[training.id]?.[s.id],
        ).length;
        return { done: completed, total: training.submodules.length };
      }
      function totalProgress(progress) {
        let done = 0,
          total = 0;
        TRAININGS.forEach((t) => {
          const p = trainingProgress(progress, t);
          done += p.done;
          total += p.total;
        });
        return {
          done,
          total,
          pct: total ? Math.round((done / total) * 100) : 0,
        };
      }

      /* ============ PROGRESS BAR COMPONENT ============ */
      function ProgressBar({ done, total, big = false }) {
        const pct = total ? Math.round((done / total) * 100) : 0;
        return (
          <div className={"progress-wrap" + (big ? " hero-progress" : "")}>
            <div className="progress-bar">
              <div className="fill" style={{ width: pct + "%" }} />
            </div>
            <span className="progress-label">
              {done}/{total}
            </span>
          </div>
        );
      }

      /* ============ TRAINING INDEX PAGE ============ */
      function TrainingIndexPage({ progress, onOpenTraining }) {
        // Group sorted trainings by difficulty
        const groups = useMemo(() => {
          const g = { Iniciante: [], Intermediário: [], Avançado: [] };
          SORTED_TRAININGS.forEach((t) => {
            g[t.difficulty].push(t);
          });
          return g;
        }, []);

        const overall = useMemo(() => totalProgress(progress), [progress]);

        return (
          <div className="training-page">
            <div className="training-topbar">
              <div className="brand">
                <div className="cemig-mark" title="CEMIG">
                  <span>C</span>
                </div>
                <span>Treinamentos PE/EM</span>
              </div>
              <div className="spacer" />
            </div>

            <div className="training-hero">
              <div className="hero-mark">🎓</div>
              <div style={{ flex: 1 }}>
                <h1>Análise inicial: Equipe Carga</h1>
                <p>
                  Escolha um treinamento abaixo para começar. Cada módulo simula
                  um fluxo real ou processo de navegação do SAP com telas e
                  dados gerados sob medida.
                </p>
                <ProgressBar done={overall.done} total={overall.total} big />
              </div>
            </div>

            <div className="training-body">
              {["Iniciante", "Intermediário", "Avançado"].map(
                (level) =>
                  groups[level].length > 0 && (
                    <div key={level} className="training-group">
                      <div className="training-section-title">
                        <span
                          className={
                            "diff-dot diff-" +
                            level
                              .toLowerCase()
                              .normalize("NFD")
                              .replace(/[\u0300-\u036f]/g, "")
                          }
                        />
                        {level}
                      </div>
                      <div className="training-grid">
                        {groups[level].map((t) => {
                          const tp = trainingProgress(progress, t);
                          return (
                            <div
                              key={t.id}
                              className={
                                "training-card " +
                                (t.available ? "available" : "locked")
                              }
                              onClick={() =>
                                t.available && onOpenTraining(t.id)
                              }
                            >
                              {!t.available && (
                                <span className="locked-badge">Em breve</span>
                              )}
                              {t.platform === "desktop" && (
                                <span
                                  className="platform-badge"
                                  title="Treinamento desktop"
                                >
                                  <Icon name="monitor" size={11} /> Desktop
                                </span>
                              )}
                              <div className="card-icon">
                                <Icon
                                  name={t.available ? "play" : "lock"}
                                  size={18}
                                />
                              </div>
                              <h3>{t.title}</h3>
                              <p>{t.desc}</p>
                              <div className="training-tags">
                                {t.tags.map((tag) => (
                                  <span key={tag} className="training-tag">
                                    {tag}
                                  </span>
                                ))}
                                {t.hasSubmodules && (
                                  <span className="training-tag submods-tag">
                                    <Icon name="layers" size={10} /> Submódulos
                                  </span>
                                )}
                              </div>
                              <ProgressBar done={tp.done} total={tp.total} />
                              {t.available && (
                                <div className="start-link">
                                  {tp.done > 0 ? "Continuar" : "Iniciar"}{" "}
                                  <Icon name="chevron-right" size={14} />

              <div className="sub-list">
                {training.submodules.map((s, i) => {
                  const isDone = !!trainingDone[s.id];
                  const available = s.available;
                  return (
                    <div
                      key={s.id}
                      className={
                        "sub-item" +
                        (available ? "" : " locked") +
                        (isDone ? " done" : "")
                      }
                      onClick={() =>
                        available && onStartSubmodule(training.id, s.id)
                      }
                    >
                      <div className="sub-num">
                        {isDone ? (
                          <Icon name="check" size={14} color="white" />
                        ) : (
                          i + 1
                        )}
                      </div>
                      <div className="sub-content">
                        <h3>{s.title}</h3>
                        <p>{s.desc}</p>
                      </div>
                      <div className="sub-action">
                        {!available ? (
                          <>
                            <Icon name="lock" size={13} /> Em breve
                          </>
                        ) : isDone ? (
                          <>
                            <Icon name="check" size={13} /> Concluído
                          </>
                        ) : (
                          <>
                            Iniciar <Icon name="chevron-right" size={14} />
                          </>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        );
      }

      /* ============ APP ============ */
      function App() {
        // route: training-index | submodule-index | home | nota-input | nota-detail | solicitacao
        const [route, setRoute] = useState({ page: "training-index" });
        const [seed, setSeed] = useState("1252714058");

        // Persistent progress { [trainingId]: { [submoduleId]: true } }
        const [progress, setProgress] = useState(() => loadProgress());
        // Helper that mutates and persists
        const markSubmoduleDone = useCallback((trainingId, submoduleId) => {
          setProgress((prev) => {
            const next = {
              ...prev,
              [trainingId]: {
                ...(prev[trainingId] || {}),
                [submoduleId]: true,
              },
            };
            saveProgress(next);
            return next;
          });
        }, []);

        // Track which training+submodule we're running (so completion can mark progress)
        const [activeSubmodule, setActiveSubmodule] = useState(null); // { trainingId, submoduleId }

        const dataset = useMemo(() => generateDataset(seed), [seed]);
        const visibleData = useMemo(
          () => ({
            ...dataset,
            notaNumero: seed.split("|")[0],
            notaServico: seed.split("|")[0],
          }),
          [dataset, seed],
        );

        // === Navigation ===
        const goTrainingIndex = useCallback(() => {
          setActiveSubmodule(null);
          setRoute({ page: "training-index" });
        }, []);

        // Click on a training card -> go to its submodule list
        const openTraining = useCallback((trainingId) => {
          const t = TRAININGS.find((x) => x.id === trainingId);
          if (!t) return;
          setRoute({ page: "submodule-index", trainingId });
        }, []);

        // Click on a submodule -> start the corresponding flow
        // Currently only "navegacao-basica" has a flow implemented; others reuse the same demo
        const startSubmodule = useCallback((trainingId, submoduleId) => {
          setActiveSubmodule({ trainingId, submoduleId });
          setRoute({ page: "home", trainingId, submoduleId });
        }, []);

        // Submodule index navigation
        const goSubmoduleIndex = useCallback(() => {
          if (activeSubmodule) {
            setRoute({
              page: "submodule-index",
              trainingId: activeSubmodule.trainingId,
            });
          } else {
            goTrainingIndex();
          }
        }, [activeSubmodule, goTrainingIndex]);

        // Going home (within the flow) means returning to the submodule index and marking the
        // submodule as completed. Treat reaching SAP "home" as "navigated" but completion
        // happens when the user explicitly goes back from the SAP flow (via the back arrow).
        const goHome = useCallback(() => setRoute({ page: "home" }), []);
        const goNotaInput = useCallback(
          () => setRoute({ page: "nota-input" }),
          [],
        );
        const goNotaDetail = useCallback((numero) => {
          setSeed(numero);
          setRoute({ page: "nota-detail" });
        }, []);
        const goSolicitacao = useCallback(
          () => setRoute({ page: "solicitacao" }),
          [],
        );
        const backToDetail = useCallback(
          () => setRoute({ page: "nota-detail" }),
          [],
        );

        // When leaving the SAP flow (back to home or training index), mark the current
        // submodule as done if there was one active.
        const exitFlow = useCallback(() => {
          if (activeSubmodule) {
            markSubmoduleDone(
              activeSubmodule.trainingId,
              activeSubmodule.submoduleId,
            );
            setRoute({
              page: "submodule-index",
              trainingId: activeSubmodule.trainingId,
            });
          } else {
            goTrainingIndex();
          }
        }, [activeSubmodule, markSubmoduleDone, goTrainingIndex]);

        const regenerate = useCallback(() => {
          const salt = String(Math.floor(Math.random() * 1e9));
          setSeed((prev) => {
            const base = prev.split("|")[0];
            return base + "|" + salt;
          });
        }, []);

        if (route.page === "training-index") {
          return (
            <TrainingIndexPage
              progress={progress}
              onOpenTraining={openTraining}
            />
          );
        }
        if (route.page === "submodule-index") {
          const training = TRAININGS.find((t) => t.id === route.trainingId);
          if (!training) {
            // Defensive: bad route, fall back to index
            return (
              <TrainingIndexPage
                progress={progress}
                onOpenTraining={openTraining}
              />
            );
          }
          return (
            <SubmoduleIndexPage
              training={training}
              progress={progress}
              onBackToIndex={goTrainingIndex}
              onStartSubmodule={startSubmodule}
            />
          );
        }
        if (route.page === "home") {
          return (
            <HomePage onOpenModificar={goNotaInput} onBackToIndex={exitFlow} />
          );
        }
        if (route.page === "nota-input") {
          return (
            <NotaInputPage
              initialValue={seed.split("|")[0]}
              onBack={goHome}
              onSubmit={goNotaDetail}
            />
          );
        }
        if (route.page === "nota-detail") {
          return (
            <NotaDetailPage
              data={visibleData}
              onBack={goHome}
              onOpenSolicitacao={goSolicitacao}
              onRegenerate={regenerate}
            />
          );
        }
        if (route.page === "solicitacao") {
          return <SolicitacaoPage data={visibleData} onBack={backToDetail} />;
        }
        return null;
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
